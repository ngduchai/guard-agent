name: miniVite
category: irregular_fixed
language: cpp
description: "Graph community detection proxy app (Louvain method, first phase)"
mpi_ranks: 4
build:
  system: make
  cmd: "make"
run:
  cmd: "mpirun -np {mpi_ranks} ./miniVite -n 1000"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: fti
  config_file: config.L1.fti
