name: deal.II
category: task_variable
language: cpp
description: "Adaptive finite element framework with AMR"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -DDEAL_II_WITH_MPI=ON .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./step-40"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: native
  config_file: null
