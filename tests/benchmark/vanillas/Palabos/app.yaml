name: Palabos
category: pipeline_fixed
language: cpp
description: "Parallel Lattice Boltzmann CFD solver"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./cavity2d 100 100 1000"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: native
  config_file: null
