name: CLAMR
category: task_variable
language: cpp
description: "Cell-based adaptive mesh refinement mini-app (shallow water equations)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake .. && make"
run:
  cmd: "mpirun -np {mpi_ranks} ./clamr_mpionly -n 128 -t 100"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
