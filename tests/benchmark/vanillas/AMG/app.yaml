name: AMG
category: irregular_fixed
language: c
description: "Algebraic multigrid solver proxy app"
mpi_ranks: 4
build:
  system: make
  cmd: "make"
run:
  cmd: "mpirun -np {mpi_ranks} ./amg -problem 1 -n 50 50 50"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: fti
  config_file: null
