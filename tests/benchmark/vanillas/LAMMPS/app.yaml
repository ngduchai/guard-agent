name: LAMMPS
category: iterative_variable
language: cpp
description: "Large-scale molecular dynamics simulator"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -S cmake -B build && cmake --build build -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./build/lmp -in examples/melt/in.melt"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
