name: LULESH
category: iterative_fixed
language: cpp
description: "Lagrangian shock hydrodynamics proxy app (Sedov blast wave)"
mpi_ranks: 8
build:
  system: cmake
  cmd: "cmake -DWITH_MPI=On -DWITH_OPENMP=Off -DCMAKE_BUILD_TYPE=Release .. && make"
run:
  cmd: "mpirun -np {mpi_ranks} ./lulesh2.0 -s 20 -i 50 -p"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: scr
  config_file: null
