name: ExaML
category: pipeline_variable
language: c
description: "Exascale maximum likelihood phylogenetic inference"
mpi_ranks: 4
build:
  system: make
  cmd: "make -f Makefile.SSE3.gcc"
run:
  cmd: "mpirun -np {mpi_ranks} ./examl -s alignment.phy -t startingTree.tre -m GAMMA -n T1"
  timeout: 300
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: native
  config_file: null
