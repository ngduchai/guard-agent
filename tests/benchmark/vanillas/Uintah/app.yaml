name: Uintah
category: irregular_variable
language: cpp
description: "Task-based AMR PDE framework (University of Utah)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./sus input.ups"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: native
  config_file: null
