name: Athena++
category: iterative_adaptive
language: cpp
description: Astrophysical MHD code with AMR (Princeton)
mpi_ranks: 4
build:
  system: make
  cmd: python3 configure.py --prob blast -mpi && make clean && make -j$(nproc)
executable: ./bin/athena
input_subdir: null
comparison:
  # 2026-05-08: original config had tolerance=1.0 (relative; allows test to
  # be 0..2x golden — effectively no check) AND no keep_patterns (numeric
  # mode compared all numbers in stdout; after ignore_patterns only ~2
  # numbers survived in 17K-char stdout).  Replaced with positive allowlist
  # of the deterministic final time-limit line so the comparator actually
  # checks the simulation reached the right end-state.
  #   - "tlim=": "tlim=1.9000000000000000e+01 nlim=-1" — final simulation
  #     time + step-limit, both deterministic regardless of failure-injection.
  # NOTE: the "Number of MeshBlocks = 100; N created, N destroyed" line is
  # NOT a stable keep_pattern: the created/destroyed counts are cumulative
  # since process-start, so a recovered run (which loads existing mesh
  # state) reports 0 created, while a fresh run reports 1308.  Use tlim
  # only.
  # ignore_patterns is silently ignored when keep_patterns is set (per
  # _filter_lines in reference_validator.py:266).
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla + checkpointed main.cpp now write
  # 6 raw doubles (48 bytes) to "validation_output.bin" in CWD on rank 0
  # inside the existing `if (Globals::my_rank == 0)` block just before
  # delete pmesh:
  #   [0] pmesh->time                            (final simulated time)
  #   [1] (double)pmesh->ncycle                  (final cycle count)
  #   [2] pmesh->dt                              (final timestep size)
  #   [3] (double)pmesh->nbtotal                 (total mesh blocks)
  #   [4] pmesh->tlim                            (time limit; constant)
  #   [5] (double)pmesh->nlim                    (cycle limit; constant or -1)
  # All values are globally consistent mesh-wide scalars.  Legacy 'tlim='
  # stdout keep_pattern retained as informational for human inspection.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - tlim=
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -i
    - inputs/hydro/athinput.blast
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -i
    - inputs/hydro/athinput.blast
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 74.98s (mean(n=3))
#   resilient_nofail_mean    = 74.89s (failure-free overhead = -0.1%)
#   resilient_once_mean      = 85.52s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 89.98s
#   1.1 * ref_once  = 94.08s
#   cap = max(...)  = 94.08s = 1.255x vanilla (basis: 1.1_x_reference_once)
#
# Source: build/validation_output/Athena++_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.255

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: ambient pressure `pamb` in the <problem> block of
# athinput.blast (default 0.1, single-zone "atmosphere" outside the
# initial blast).  The Sedov-style spherical blast wave at AMR=2 is
# driven by the contrast prat=pamb_high/pamb (default 100); perturbing
# pamb shifts the pressure ratio and hence the post-shock density /
# temperature / velocity that propagate into the final tlim= state,
# which the comparator inspects via numeric tolerance 0.001.
#
# Range: 0.099 - 0.101 (+/-1% around nominal 0.1).  Why narrow:
#   - keeps pamb well clear of zero (would singular-ize the contact
#     discontinuity) and of pamb >= prat * pamb_high (would invert the
#     blast direction)
#   - does NOT change grid (nx1=nx2=200, AMR=2) or step count -- the
#     CFL-controlled dt depends on c_s, which depends on p^(1/2), so a
#     0.5% shift in c_s gives <1% step-count drift, well inside the
#     timing-stability invariant
#   - AMR refinement threshold `thr` stays at 0.5 so the refinement
#     pattern is preserved (no refined-cell-count drift -> no
#     per-step FLOPS drift)
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(0.099) - Z_P(0.101)| > 1000 * tolerance (1e-3)
#   (b) elapsed times within 5% of unperturbed baseline (0.1)
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - `cfl_number` in <time> block (default 0.3), tight range
#     0.295-0.305: stays sub-CFL, may shift step count by ~3%
#   - `gamma` in <hydro> block (default 1.666...), tight range
#     1.66-1.673: changes Rankine-Hugoniot jump conditions, but the
#     iso_sound_speed comment in the input file derives sqrt(gamma*p/d)
#     from a specific gamma -- changing gamma without updating
#     iso_sound_speed would desync the initial pressure
#   - `radius` (default 0.1) ±2% — changes initial blast volume
#     slightly; safer than gamma since iso_sound_speed is unaffected
perturbation:
  method: regex_replace
  file: inputs/hydro/athinput.blast
  pattern: 'pamb\s*=\s*[0-9.eE+-]+'
  replacement_template: 'pamb          = {value:.6f}'
  value_range: [0.099, 0.101]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
