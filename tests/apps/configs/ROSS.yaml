name: ROSS
category: asynchronous
language: c
description: ROSS Parallel Discrete Event Simulation (PDES) - PHOLD benchmark
mpi_ranks: 2
build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DROSS_BUILD_MODELS=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) phold
executable: ./_build/models/phold/phold
# Resilient/reference variant uses 'pholdio' (RIO-enabled — supports
# --io-store/--io-files for native checkpoint/restart).  Lives only in the
# checkpointed source tree (tests/apps/checkpointed/ROSS/models/pholdio);
# vanilla doesn't have it, so we override the build cmd here for resilient.
ckpt_executable: pholdio
ckpt_build:
  system: cmake
  # -DUSE_RIO=ON registers the global RIO opts (--io-files etc.) into pholdio's
  # tw_opt set via core/tw-setup.c:90.  Without this flag, pholdio compiles
  # but rejects --io-files=1 at runtime.  See tests/apps/patches/ROSS/_extra_args.txt.
  cmd: mkdir -p _build && cd _build && cmake .. -DROSS_BUILD_MODELS=ON -DUSE_RIO=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) phold pholdio
input_subdir: null
comparison:
  # Switched to numeric (2026-05-02 phase B): vanilla `phold` and reference
  # `phold` (different source trees, same name) produce slightly different
  # GVT counts (470733 vs 470735, etc.) — text-diff fails on byte-identical
  # match.  Numeric with 1% tolerance accepts the ~0.001% binary-vs-binary
  # variation while still catching real divergence.
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla phold.main.c + reference
  # pholdio.c now write 6 raw doubles (48 bytes) to "validation_output.bin"
  # in CWD on rank 0 right after tw_run() finishes:
  #   [0] (double)g_tw_nlp                                (total LPs per rank)
  #   [1] g_tw_lookahead                                  (lookahead config)
  #   [2] (double)g_tw_synchronization_protocol           (sync mode)
  #   [3] (double)g_phold_start_events / g_pholdio_start_events  (per-LP starting events)
  #   [4] mean                                            (exponential dist mean)
  #   [5] percent_remote                                  (remote event rate)
  # CONFIG-only signature: ROSS is stochastic (event-driven Monte Carlo)
  # so a state-based signature with strict 1e-12 tolerance would be
  # unreliable.  CONFIG values are deterministic from CLI; sufficient for
  # cross-consistency at same workload (both phold and pholdio produce
  # byte-identical bytes when both run with same CLI args).  Legacy
  # 'Total GVT Computations' / 'Total Events Processed' stdout keep_patterns
  # retained as informational for human inspection.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  # Hardened against LLM gaming (CRIT-1, 2026-05-02): the previous
  # patterns Lookahead.. / Remote... were PHOLD parameter echoes the LLM
  # could trivially print without running the simulation.  Replaced with
  # ROSS/TW performance counters that are only emitted after tw_run()
  # completes — the gaming attack at phold.main.c:763
  # ("*** FAST RECOVERY (...; tw_run() skipped) ***") would NEVER produce
  # these signatures, so the F-3 Layer B empty-match guard catches it.
  keep_patterns:
  # Dropped 'Event Processing' (2026-05-02 phase B): that label appears in
  # the TW Clock Cycle Statistics block alongside a wall-time value (~1.54
  # seconds) — varies run-to-run by ~1%, fails even numeric tolerance 0.01.
  # Kept patterns are pure event/reduction counts (deterministic per binary).
  - Total GVT Computations
  - Total All Reduce Calls
  - Average Reduction / GVT
  - Total Events Processed
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - --synch=3
    - --end=30000
    - --nlp=4000
    - --extramem=100000
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - --synch=3
    - --end=30000
    - --nlp=4000
    - --extramem=100000
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 103.73s (mean(n=3))
#   resilient_nofail_mean    = 105.43s (failure-free overhead = +1.6%)
#   resilient_once_mean      = 104.47s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 124.48s
#   1.1 * ref_once  = 114.92s
#   cap = max(...)  = 124.48s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/ROSS_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# DISABLED: ROSS / PHOLD has perturbable knobs in principle (--remote
# event rate, --mean exponential distribution mean, --lookahead) but
# every ROSS option uses the `--key=value` syntax exclusively:
# tw-opts.c:460 calls `strchr(arg + 2, '=')` and the parser rejects
# space-separated `--key value` pairs.  The app_arg_override
# perturbation method calls `str(value)` and assigns the result to
# `app_args[arg_index]`, which means it cannot preserve the `--key=`
# prefix: replacing `--remote=0.25` with str(0.243) would give bare
# `0.243`, which tw_opt_parse rejects as an unknown option.
#
# ROSS / PHOLD reads no input file, no environment variable usable as
# a perturbation channel; the only file-input mechanism
# (--args-file=path, tw-opts.c:507) requires creating an overlay file
# under tests/apps/patches/ROSS/ and adding `--args-file=...` to
# app_args, which is more invasive than warranted for this rollout
# cycle.
#
# Result: the cold-replay detector falls back to the legacy
# single-point F-19 ratio gate for ROSS.  The multi-fraction slope
# test still runs and provides cold-replay protection independent of
# the perturbation prong.
#
# Future work: extend app_arg_override to support a
# `replacement_template` for the value slot (would let us write
# `--remote={value:.4f}` directly in the YAML).  Out of scope for the
# rollout cycle.
perturbation:
  method: disabled
  reason: 'ROSS / PHOLD uses --key=value syntax exclusively (tw-opts.c:460 requires `=`); app_arg_override cannot preserve the `--key=` prefix when replacing the arg with str(value)'
