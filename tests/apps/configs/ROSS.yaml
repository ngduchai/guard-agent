name: ROSS
category: asynchronous
language: c
description: ROSS Parallel Discrete Event Simulation (PDES) - PHOLD benchmark
# 2026-05-24: bumped from mpi_ranks=2 → 4 to align with the rest of the
# suite (per-app-rank parity for the asymmetric-restart F-collective-
# restart gate and for fairness in cold-replay detection coverage).
# ROSS distributes LPs (--nlp=4000 = 1000 per rank at 4 ranks) across
# PEs automatically; v9 schema slots [0..3] are tw_net_statistics()
# MPI_SUM reductions → rank-agnostic.  PHOLD with synch=3 OPTIMISTIC at
# 4 ranks may produce a different rollback envelope than at 2 ranks;
# re-bake baseline_cache + recheck production_cap_ratio + re-calibrate
# perturbation (currently safe_value_range_verified: false) before
# iter/bench under the new rank count.
mpi_ranks: 4
build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DROSS_BUILD_MODELS=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) phold
executable: ./_build/models/phold/phold
# Resilient/reference variant uses 'pholdio' (RIO-enabled — supports
# --io-store/--io-files for native checkpoint/restart).  Lives only in the
# checkpointed source tree (tests/apps/checkpointed/ROSS/models/pholdio);
# vanilla doesn't have it, so we override the build cmd here for resilient.
ckpt_executable: pholdio
ckpt_build:
  system: cmake
  # -DUSE_RIO=ON registers the global RIO opts (--io-files etc.) into pholdio's
  # tw_opt set via core/tw-setup.c:90.  Without this flag, pholdio compiles
  # but rejects --io-files=1 at runtime.  See tests/apps/patches/ROSS/_extra_args.txt.
  cmd: mkdir -p _build && cd _build && cmake .. -DROSS_BUILD_MODELS=ON -DUSE_RIO=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) phold pholdio
input_subdir: null
comparison:
  # 2026-05-24 (Step 0 v9): replaced v8 config-only schema (which made the
  # comparator tautological — every slot was a g_tw_* config global populated
  # before tw_run() and never mutated by it; a resilient implementation that
  # skipped tw_run() entirely could pass byte-identically).  vanilla
  # phold.main.c + reference pholdio.c now write 6 STATE-DERIVED raw doubles
  # (48 bytes) to "validation_output.bin" in CWD on rank 0 just before
  # tw_end():
  #   [0] (double)s_nevent_processed   global-SUM events committed     [STATE]
  #   [1] (double)s_e_rbs              global-SUM events rolled back   [STATE]
  #   [2] (double)s_rb_total           global-SUM total rollbacks      [STATE]
  #   [3] (double)g_tw_gvt_done        completed GVT computations      [STATE]
  #   [4] g_tw_lookahead               config sanity marker            [CONFIG]
  #   [5] (double)g_tw_synchronization_protocol  config sanity marker  [CONFIG]
  # Per-rank stats are aggregated locally via tw_get_stats(), then MPI-reduced
  # across the partition via tw_net_statistics() (collective — ALL ranks must
  # call it; see core/network-mpi.c:696-747).  After the reduce,
  # g_tw_pe->stats holds globally-summed event counters on masternode (rank 0)
  # only.  The 17-element s_net_events block carries s_nevent_processed /
  # s_e_rbs / s_rb_total via a single MPI_Reduce with MPI_SUM (see
  # ross-types.h:117-170 for struct layout).
  # Slots [0..3] react to RNG-driven event-distribution shifts (perturbing
  # --mean= or --remote= propagates into commit/rollback counts); a
  # cold-replayed (re-seeded or zero-init) resilient run produces different
  # event traces and diverges on these slots.  Bit-exact under correctly-
  # resumed replay (same seed -> same deterministic event order -> same
  # counts).  Legacy stdout keep_patterns retained as informational only.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  # Hardened against LLM gaming (CRIT-1, 2026-05-02): the previous
  # patterns Lookahead.. / Remote... were PHOLD parameter echoes the LLM
  # could trivially print without running the simulation.  Replaced with
  # ROSS/TW performance counters that are only emitted after tw_run()
  # completes — the gaming attack at phold.main.c:763
  # ("*** FAST RECOVERY (...; tw_run() skipped) ***") would NEVER produce
  # these signatures, so the F-3 Layer B empty-match guard catches it.
  keep_patterns:
  # Dropped 'Event Processing' (2026-05-02 phase B): that label appears in
  # the TW Clock Cycle Statistics block alongside a wall-time value (~1.54
  # seconds) — varies run-to-run by ~1%, fails even numeric tolerance 0.01.
  # Kept patterns are pure event/reduction counts (deterministic per binary).
  - Total GVT Computations
  - Total All Reduce Calls
  - Average Reduction / GVT
  - Total Events Processed
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    # 2026-05-24: appended `--remote=0.25` so the v2.2 cold-replay
    # perturbation has a token to override at arg_index=4.  PHOLD default
    # is also 0.25 (phold.h:30), so a perturbation-free run matches the
    # legacy app_args set byte-identically.
    app_args:
    - --synch=3
    - --end=30000
    - --nlp=4000
    - --extramem=100000
    - --remote=0.25
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - --synch=3
    - --end=30000
    - --nlp=4000
    - --extramem=100000
    - --remote=0.25
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 103.73s (mean(n=3))
#   resilient_nofail_mean    = 105.43s (failure-free overhead = +1.6%)
#   resilient_once_mean      = 104.47s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 124.48s
#   1.1 * ref_once  = 114.92s
#   cap = max(...)  = 124.48s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/ROSS_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-24, enabled by
# arg_template framework extension).  See docs/cold_replay_detector.md §5 + §8.
#
# Knob: PHOLD remote-event probability `--remote=<float>` (the per-event
# coin-flip threshold at phold.main.c:65 — values closer to 1.0 send
# more events to random remote LPs and increase rollback frequency in
# OPTIMISTIC mode).  Perturbing this in a tight range around 0.25
# (PHOLD default) shifts the global event commit/rollback counters that
# the v9 state-derived emitter writes (slots [0..3]); tolerance=1e-12
# numeric-tolerance.
#
# Range: 0.230 - 0.270 (+/-8% around the nominal 0.25).
# Why this range:
#   - --remote stays in [0,1]; the 0.23-0.27 envelope keeps the synch=3
#     OPTIMISTIC scheduler comfortably away from pathological extremes
#     (0.0 = pure local events, no rollbacks; 1.0 = all-remote stress
#     that can saturate the event queue at extramem=100000).
#   - PHOLD is event-Markovian: ~8% delta in remote-event probability
#     reliably shifts s_nevent_processed / s_e_rbs counters past 1e-12
#     tolerance without changing wall-time meaningfully.
#
# Mechanism: app_arg_override with arg_template.  ROSS options use
# `--key=value` syntax exclusively (tw-opts.c:460 requires `=`), which
# bare str(value) substitution cannot produce.  The arg_template field
# (validation/veloc/app_config.py, added 2026-05-24) renders the
# perturbed value through a Python format string instead, preserving
# the `--remote=` prefix.
#
# Calibration: pending.  The calibrator must verify:
#   (a) |Z_P(0.230) - Z_P(0.270)| > 1000 * tolerance
#   (b) elapsed times within 15% of unperturbed baseline (0.25)
#   (c) no NaN/crash at either extreme
perturbation:
  method: app_arg_override
  arg_index: 4
  arg_template: '--remote={value:.4f}'
  value_range: [0.230, 0.270]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
