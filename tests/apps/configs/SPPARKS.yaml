name: SPPARKS
category: iterative_fixed
language: cpp
description: Stochastic Parallel PARticle Kinetic Simulator (KMC on lattice)
mpi_ranks: 4
build:
  system: make
  cmd: cd src && make mpi && cp spk_mpi ..
executable: ../../spk_mpi
input_subdir: examples/ising
comparison:
  # 2026-05-08: original keep_pattern 'Loop time' grepped a wall-time line
  # (varies 50%+ across runs) and tolerance=1.0 (relative; allows 100%
  # diff) made the comparator pass with max_diff=53.8% in practice.
  # SPPARKS uses fixed RNG seed (56789 in in.validation) so the data-table
  # columns (Naccept, Nreject, Nsweeps, Energy) are deterministic across
  # runs — only the CPU column varies.  Switch to a tight setup-line check
  # plus the deterministic site-creation summary; both must match exactly.
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla + checkpointed main.cpp now call
  # dumpValidationSignatureBin_spparks(spk) after input->file() finishes.
  # Writes 6 raw doubles (48 bytes) to "validation_output.bin" in CWD on
  # rank 0:
  #   [0] global nsites (MPI_SUM of app->nlocal across ranks)
  #   [1] app->time                                   (final simulation time)
  #   [2] (double)rank0_nlocal                        (rank 0's local site count)
  #   [3] (double)world_size                          (number of MPI ranks)
  #   [4] (double)(global_nsites)                     (duplicate for invariance)
  #   [5] (double)world_size * app->time              (combined invariant)
  # app->time is identical per rank; app->nlocal reduced via MPI_Reduce(SUM).
  # Legacy "Created box" / "settings made for site" stdout keep_patterns
  # retained as informational for human inspection.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - Created box
  - settings made for site
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -in
    - in.validation
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (same workload as validation; cwd=examples/ising via input_subdir)
    app_args:
    - -in
    - in.validation
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-17 v3, REAL RECOVERY via dump+read_sites).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# CORRECTION OF PRIOR ANALYSIS (v2 claimed Y/D doesn't apply for SPPARKS):
# SPPARKS does NOT have a native `restart` command, but it DOES have the
# building blocks for real checkpoint recovery:
#   - `dump 1 sites N dump.ising.*`  (per-site state every N sweeps)
#   - `read_sites <file>`             (loads initial state from a dump)
# The run_with_restart.sh in the repo demonstrates the pattern.
#
# Prior bench's problem: --reference-input-priority overlayed vanilla's
# in.validation (which has dump stripped) onto the reference, so the ref
# ran WITHOUT writing dumps -> attempt_2 cold-restarted (1.515x).
#
# Fix applied (2026-05-17):
#   1. ref's in.validation: changed `run 5000.0.0` -> `run 18800.0.0`
#      to match vanilla workload, keep dump command
#   2. tests/apps/patches/SPPARKS/examples/ising/in.validation: overlay
#      with same (dump+18800) so --reference-input-priority uses it
#   3. tests/apps/patches/SPPARKS/_recovery_hook.sh: detects latest
#      COMPLETE dump (skips SIGKILL-truncated dump), writes in.recovery
#      with read_sites + remaining sweeps
#   4. tests/apps/patches/SPPARKS/_extra_args_recovery.txt: -in in.recovery
#
# Bench n=3 (framework_version=2026-05-15, real recovery):
#   vanilla_mean        = 103.26s
#   resilient_nofail    = 109.42s (1.060x — overhead from writing dumps)
#   resilient_once      = 110.93s (1.074x — REAL recovery resumes from
#                                  latest dump, only redo remaining work)
#
# Cap calculation:
#   1.2 * vanilla   = 123.91s
#   1.1 * ref_once  = 122.02s
#   cap = max(...)  = 123.91s = 1.200x vanilla (basis: 1.2_x_vanilla)
#
# Improvement: prior 1.667x -> 1.200x. Real recovery brings SPPARKS in
# line with the vanilla-dominated cap pattern.
production_cap_ratio: 1.200

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: KMC bath temperature `temperature` in in.validation (default
# 1.0 in reduced Ising units, T_c ~ 2.27 for 2D Ising).  The acceptance
# probability for the Metropolis sweep is exp(-dE/T); perturbing T
# shifts the rejection rate and the equilibrium magnetization, which
# changes the deterministic Naccept/Nreject/Nsweeps/Energy data-table
# columns the comparator reads (tolerance=0.001).  Note: SPPARKS uses
# a fixed RNG seed (56789) so the trajectory is deterministic across
# repeated runs at the same T.
#
# Range: 0.98 - 1.02 (+/-2% around nominal 1.0).  Why narrow:
#   - 2D Ising critical temperature is ~2.27; ±2% around T=1.0 keeps
#     the system well in the ferromagnetic regime (no near-critical
#     correlation-length divergence that would break determinism /
#     timing)
#   - Metropolis acceptance is exponential in 1/T, so even ±2% gives a
#     measurable shift in Naccept across 18800 sweeps over 250000 sites
#   - same lattice (500x500), same sweeps (18800), same seed
#     -> deterministic execution-time invariant holds
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(0.98) - Z_P(1.02)| > 1000 * tolerance (1e-3)
#   (b) elapsed times within 5% of unperturbed baseline
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - `seed` in in.validation (range [10000, 999999]): pure stochastic
#     knob, perfect timing-stability, but Ising KMC output diff is
#     entirely driven by RNG trajectory — output diff guaranteed huge
#   - `stats 100.0`: changes output cadence, NOT a physics knob (would
#     change which sweeps are printed, output trivially differs but
#     not "physics differs")
perturbation:
  method: regex_replace
  file: examples/ising/in.validation
  pattern: '\ntemperature\s+[0-9.eE+-]+'
  replacement_template: '\ntemperature  {value:.4f}'
  value_range: [0.98, 1.02]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
