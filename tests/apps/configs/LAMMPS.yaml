name: LAMMPS
category: iterative_variable
language: cpp
description: Large-scale molecular dynamics simulator
mpi_ranks: 4
build:
  system: cmake
  cmd: cmake -S cmake -B _build -DBUILD_MPI=yes -DCMAKE_BUILD_TYPE=Release && cmake --build _build -j$(nproc)
executable: ./_build/lmp
input_subdir: null
comparison:
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla + checkpointed main.cpp now call
  # dumpValidationSignatureBin_lammps(lammps, comm) after input->file().
  # Writes 6 raw doubles (48 bytes) to "validation_output.bin" in CWD on
  # rank 0:
  #   [0] (double)atom->natoms                        (total atoms, global)
  #   [1] (double)atom->nlocal                        (rank 0's local count)
  #   [2] (double)update->ntimestep                   (final timestep)
  #   [3] update->dt                                  (timestep size)
  #   [4] (double)update->ntimestep * update->dt      (final simulated time)
  #   [5] (double)world_size                          (number of MPI ranks)
  # atom->natoms is maintained by LAMMPS as a globally consistent count.
  # update fields are identical per rank.  Legacy stdout keep_pattern
  # '     33000' retained as informational for human inspection.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - '     33000'
  ignore_patterns:
  - LAMMPS
  - OMP_NUM_THREADS
  - using
  - Lattice
  - Created
  - create_atoms
  - Generated
  - Neighbor
  - 'update:'
  - max neigh
  - ghost
  - binsize
  - neighbor list
  - pair
  - attributes
  - stencil
  - 'bin:'
  - Setting up
  - Unit style
  - Current step
  - Time step
  - Per MPI
  - Step
  - Loop time
  - Performance
  - Nlocal
  - Histogram
  - Total wall
  - Dangerous
  - Last active
  - WARNING
  - MPI task
  - CPU
  - memory
  - master
  - orthogonal
  - processor
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -in
    - bench/in.lj_long
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -in
    - bench/in.lj_long
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 107.48s (mean(n=3))
#   resilient_nofail_mean    = 108.0s (failure-free overhead = +0.5%)
#   resilient_once_mean      = 110.77s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 128.97s
#   1.1 * ref_once  = 121.84s
#   cap = max(...)  = 128.97s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/LAMMPS_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: LAMMPS `velocity` RNG seed (the integer 87287 in `velocity all
# create 1.44 87287 loop geom`).  LAMMPS uses this seed to draw atom
# velocities from a Maxwell-Boltzmann distribution at temperature
# T=1.44 (reduced LJ units); reseeding gives a totally different MD
# trajectory but the same expectation values for the deterministic
# end-of-run diagnostics (the line matching `keep_patterns: ['     33000']`
# is the LAMMPS thermo output at step 33000 -- Temp, E_pair, E_mol,
# TotEng, Press, etc., which vary across seeds by O(1/sqrt(N))).
#
# Range: integer [1, 999999].  Why this range:
#   - LAMMPS documentation: `velocity create` requires seed > 0
#   - upper bound stays inside any reasonable int -> no overflow
#   - large discrete range makes pre-caching infeasible
#
# Why seed is timing-safe:
#   - same lattice (fcc 0.8442), same xx/yy/zz = 20*1 (8000 atoms),
#     same run count (33000 timesteps), same pair_style, same
#     neighbor settings -> identical loop structure
#   - LAMMPS MD wall time is bounded by N_atoms * N_steps * cost(pair)
#     -- all independent of velocity seed
#   - The thermo output cadence depends on the default thermo every-N
#     (100 in this LAMMPS build), so the keep_patterns line at step
#     33000 always appears
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(seed_lo) - Z_P(seed_hi)| > 1000 * tolerance (1e-3)
#   (b) elapsed times within 5% of unperturbed baseline (seed=87287)
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - Temperature in the `velocity all create` line (1.44), tight
#     range 1.42-1.46: physics knob, shifts kinetic energy at init
#   - `lattice fcc 0.8442` (density), ±0.5%: changes box size and
#     hence pair-interaction range slightly
perturbation:
  method: regex_replace
  file: bench/in.lj_long
  pattern: '\nvelocity\s+all\s+create\s+1\.44\s+[0-9]+'
  replacement_template: '\nvelocity        all create 1.44 {value:d}'
  value_range: [1, 999999]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
