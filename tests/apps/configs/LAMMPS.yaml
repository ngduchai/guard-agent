name: LAMMPS
category: iterative_variable
language: cpp
description: Large-scale molecular dynamics simulator
mpi_ranks: 4
build:
  system: cmake
  cmd: cmake -S cmake -B _build -DBUILD_MPI=yes -DCMAKE_BUILD_TYPE=Release && cmake --build _build -j$(nproc)
executable: ./_build/lmp
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - '     33000'
  ignore_patterns:
  - LAMMPS
  - OMP_NUM_THREADS
  - using
  - Lattice
  - Created
  - create_atoms
  - Generated
  - Neighbor
  - 'update:'
  - max neigh
  - ghost
  - binsize
  - neighbor list
  - pair
  - attributes
  - stencil
  - 'bin:'
  - Setting up
  - Unit style
  - Current step
  - Time step
  - Per MPI
  - Step
  - Loop time
  - Performance
  - Nlocal
  - Histogram
  - Total wall
  - Dangerous
  - Last active
  - WARNING
  - MPI task
  - CPU
  - memory
  - master
  - orthogonal
  - processor
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -in
    - bench/in.lj_long
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -in
    - bench/in.lj_long
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300
