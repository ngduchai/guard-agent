name: LAMMPS
category: iterative_variable
language: cpp
description: Large-scale molecular dynamics simulator
mpi_ranks: 4
build:
  system: cmake
  cmd: cmake -S cmake -B _build -DBUILD_MPI=yes -DCMAKE_BUILD_TYPE=Release && cmake --build _build -j$(nproc)
executable: ./_build/lmp
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - '     33000'
  ignore_patterns:
  - LAMMPS
  - OMP_NUM_THREADS
  - using
  - Lattice
  - Created
  - create_atoms
  - Generated
  - Neighbor
  - 'update:'
  - max neigh
  - ghost
  - binsize
  - neighbor list
  - pair
  - attributes
  - stencil
  - 'bin:'
  - Setting up
  - Unit style
  - Current step
  - Time step
  - Per MPI
  - Step
  - Loop time
  - Performance
  - Nlocal
  - Histogram
  - Total wall
  - Dangerous
  - Last active
  - WARNING
  - MPI task
  - CPU
  - memory
  - master
  - orthogonal
  - processor
sizes:
  validation:
    description: "smallest workload \u2014 used for AUDIT (vanilla strip verification) + ITER + baseline cache"
    app_args:
    - -in
    - bench/in.lj_long
    nominal_runtime_s: null
  small:
    description: "first benchmark cycle \u2014 fast tier"
    app_args:
    - -in
    - bench/in.lj_long
    nominal_runtime_s: null
  medium:
    description: "TODO: scaled-up workload (~3-5\xD7 small) for second benchmark cycle"
    app_args: null
    nominal_runtime_s: null
  large:
    description: "TODO: largest workload (~10\xD7 small) for third benchmark cycle"
    app_args: null
    nominal_runtime_s: null
frequencies:
  nofail:
    description: "no failures injected \u2014 error-free baseline timing"
    inject_failures: false
  once:
    description: single failure mid-run; recovery from one checkpoint
    inject_failures: true
    delay_fraction: 0.5
    failures_count_target: 1
  multi:
    description: "failures every nominal_runtime/4 \u2014 repeated recovery"
    inject_failures: true
    delay_fraction: 0.25
    failures_count_target: 3
  burst:
    description: "failures every nominal_runtime/7 \u2014 stress test"
    inject_failures: true
    delay_fraction: 0.143
    failures_count_target: 6
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300
