name: HPCG
category: iterative_fixed
language: cpp
description: High Performance Conjugate Gradient — Krylov solver (PCG with multigrid preconditioner) dominated by SpMV + MPI_Allreduce
mpi_ranks: 4
build:
  system: make
  cmd: make arch=Linux_MPI
executable: ./xhpcg_run
input_subdir: bin
comparison:
  # 2026-05-18 (Step 0 v8): converted from stdout text comparison to file-based
  # binary comparison.  vanilla + checkpointed main.cpp now call
  # dumpValidationSignatureBin() which writes 6 raw doubles (48 bytes) to
  # "validation_output.bin" in CWD on rank 0:
  #   [0] sum   of testnorms_data.values[0..numberOfCgSets-1]
  #   [1] sum^2 of testnorms_data.values[0..numberOfCgSets-1]
  #   [2] max   of testnorms_data.values[0..numberOfCgSets-1]
  #   [3] min   of testnorms_data.values[0..numberOfCgSets-1]
  #   [4] count = (double)numberOfCgSets
  #   [5] final-step marker = (double)numberOfCgSets
  # No MPI reduction needed: testnorms_data.values is computed identically on
  # every rank (each entry is normr/normr0 from CG, which is globally reduced).
  # Cross-consistency verified at Step 0.6c.  Legacy HPCG_VALIDATION= stdout
  # line is still emitted by HPCG's own ReportResults for human inspection but
  # the validator now uses the binary file below.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - HPCG_VALIDATION=
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache.  Uses positional integer form (nx ny nz rt) which HPCG_Init parses identically to --nx=N --ny=N --nz=N --rt=N (init.cpp lines 84-86 read first 4 args as int positional fallback for "MPI environments where command line arguments may get complicated").  Switched 2026-05-17 from --key=value to positional so app_arg_override perturbation works without a tooling extension.
    app_args:
    - '32'
    - '32'
    - '32'
    - '120'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — same positional form as validation
    app_args:
    - '32'
    - '32'
    - '32'
    - '120'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 53.31s (mean(n=3))
#   resilient_nofail_mean    = 53.02s (failure-free overhead = -0.5%)
#   resilient_once_mean      = 54.65s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 63.97s
#   1.1 * ref_once  = 60.12s
#   cap = max(...)  = 63.97s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/HPCG_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17, DISABLED 2026-05-20).
# See docs/cold_replay_detector.md §5 + §8.
#
# DISABLED: HPCG has no continuous integer knob within the calibrator's
# 30% timing-stability invariant that doesn't crash multigrid setup.
#
# Survey of HPCG CLI options (init.cpp:73 cparams[][7] array):
#   --nx=, --ny=, --nz=  : geometry; sub-grid count scales O(n^3).
#                          Multigrid coarsening (GenerateCoarseProblem.cpp:50)
#                          asserts `nzf%2==0` at every coarsening level.
#                          Default uses 4 levels of multigrid (1 fine + 3
#                          coarse), so nz must be divisible by 2 three
#                          times (i.e. by 8) for coarse-problem generation
#                          to succeed.  Near nz=32 the only divisible-by-8
#                          alternatives are {24, 32, 40}: shifting ±8 is a
#                          25% workload shift -- borderline ok on timing
#                          but values 31, 33 (etc.) hit the SIGABRT at
#                          GenerateCoarseProblem.cpp:50.  app_arg_override
#                          pulls a uniform-random value from the range,
#                          so any range wider than {32} contains odd
#                          values that crash.
#   --rt=               : benchmark wall-time target.  rt perturbs wall
#                          time ~1:1 (timing-stability invariant) AND
#                          the validation signature (sum of testnorms
#                          across completed CG sets) only changes if rt
#                          straddles a set-completion boundary; otherwise
#                          rt 118 vs 122 produces the same set count and
#                          therefore identical output (sensitivity
#                          invariant fails).
#   --pz=, --zl=, --zu= : variable subdomain z.  Non-zero values rewrite
#                          the local sub-block partition -> uneven load
#                          -> per-step time drift.  No safe continuous
#                          range exists.
#   --npx=, --npy=, --npz=: MPI process grid; sub-grids only valid for
#                          factorizations of the rank count.  Discrete
#                          knob with at most a couple of valid values at
#                          n=4 ranks; not usable for uniform random
#                          perturbation.
#
# History: nz @ [31, 33] was tried 2026-05-19 and crashed both extremes
# (SIGABRT at GenerateCoarseProblem.cpp:50) -- HPCG_baseline went BLOCKED.
#
# Falls back to the legacy single-point F-19 cold-replay detector + 8-phase
# audit; coverage is reduced (no per-cycle perturbation defense against
# C'/E' cache-class gaming) but the structural source-read + bench-shape
# gates remain in force.  See _decisions.log 2026-05-20 entry.
perturbation:
  method: disabled
  reason: 'HPCG multigrid asserts nzf%2==0 at every coarsening level (GenerateCoarseProblem.cpp:50); nz must be divisible by 8 for the default 4-level setup. Only valid integer perturbations near 32 are {24, 32, 40} (±25% workload shift), and app_arg_override picks uniform-random from a range so any range wider than {32} contains odd values that SIGABRT. rt and process-grid knobs fail timing or sensitivity invariants. Falls back to legacy single-point F-19 cold-replay detector.'
