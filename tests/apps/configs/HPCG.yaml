name: HPCG
category: iterative_fixed
language: cpp
description: High Performance Conjugate Gradient — Krylov solver (PCG with multigrid preconditioner) dominated by SpMV + MPI_Allreduce
mpi_ranks: 4
build:
  system: make
  cmd: make arch=Linux_MPI
executable: ./xhpcg_run
input_subdir: bin
comparison:
  method: text
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - HPCG_VALIDATION=
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - --nx=32
    - --ny=32
    - --nz=32
    - --rt=120
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — bumped to match validation (was --rt=60 which was less than validation)
    app_args:
    - --nx=32
    - --ny=32
    - --nz=32
    - --rt=120
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 53.31s (mean(n=3))
#   resilient_nofail_mean    = 53.02s (failure-free overhead = -0.5%)
#   resilient_once_mean      = 54.65s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 63.97s
#   1.1 * ref_once  = 60.12s
#   cap = max(...)  = 63.97s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/HPCG_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# DISABLED: HPCG cannot be perturbed without violating one of the
# three invariants.
#
# Survey of HPCG CLI options (init.cpp:73 cparams[][7] array):
#   --nx=, --ny=, --nz=  : geometry; sub-grid count scales O(n^3).
#                          Even a single-cell shift moves CG iteration
#                          count -> wall-time drift.
#   --rt=               : benchmark wall-time target.  Whole point of
#                          HPCG benchmark mode is "run for rt seconds";
#                          perturbing rt perturbs wall time 1:1.
#   --pz=, --zl=, --zu= : variable subdomain z; non-zero values rewrite
#                          the local sub-block partition -> uneven
#                          load -> changes per-step time.
#   --npx=, --npy=, --npz=: MPI process grid; sub-grids only valid for
#                          factorizations of the rank count.
# All HPCG CLI flags use `--key=value` syntax exclusively (init.cpp:91
# uses startswith / strlen + sscanf, no space-separated variant); the
# app_arg_override perturbation method replaces a whole argv slot with
# `str(value)` and so cannot preserve the `--key=` prefix.
# HPCG reads no environment variables and the only file input
# (`hpcg.dat`) is consulted ONLY if no `--nx/--ny/--nz` are passed
# (init.cpp:98) -- our validation cell passes all three, so the file
# path is dead.
# HPCG is fully deterministic: no RNG seed, no stochastic component.
#
# Result: the cold-replay detector falls back to the legacy
# single-point F-19 ratio gate for HPCG.  The multi-fraction slope
# test still runs and provides cold-replay protection independent of
# the perturbation prong.
#
# Future work: switch the validation workload to use `hpcg.dat` (so we
# can regex_replace inside the file), or hook the perturbation through
# a custom wrapper that converts `value` -> `--rt=value`.  Out of
# scope for the per-app rollout cycle.
perturbation:
  method: disabled
  reason: 'HPCG CLI uses --key=value only (incompatible with app_arg_override); all numeric knobs are geometry or wall-time, all timing-unstable; no RNG seed'
