name: HPCG
category: iterative_fixed
language: cpp
description: High Performance Conjugate Gradient — Krylov solver (PCG with multigrid preconditioner) dominated by SpMV + MPI_Allreduce
mpi_ranks: 4
build:
  system: make
  cmd: make arch=Linux_MPI
executable: ./xhpcg_run
input_subdir: bin
comparison:
  method: text
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - HPCG_VALIDATION=
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache.  Uses positional integer form (nx ny nz rt) which HPCG_Init parses identically to --nx=N --ny=N --nz=N --rt=N (init.cpp lines 84-86 read first 4 args as int positional fallback for "MPI environments where command line arguments may get complicated").  Switched 2026-05-17 from --key=value to positional so app_arg_override perturbation works without a tooling extension.
    app_args:
    - '32'
    - '32'
    - '32'
    - '120'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — same positional form as validation
    app_args:
    - '32'
    - '32'
    - '32'
    - '120'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 53.31s (mean(n=3))
#   resilient_nofail_mean    = 53.02s (failure-free overhead = -0.5%)
#   resilient_once_mean      = 54.65s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 63.97s
#   1.1 * ref_once  = 60.12s
#   cap = max(...)  = 63.97s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/HPCG_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# DISABLED: HPCG cannot be perturbed without violating one of the
# three invariants.
#
# Survey of HPCG CLI options (init.cpp:73 cparams[][7] array):
#   --nx=, --ny=, --nz=  : geometry; sub-grid count scales O(n^3).
#                          Even a single-cell shift moves CG iteration
#                          count -> wall-time drift.
#   --rt=               : benchmark wall-time target.  Whole point of
#                          HPCG benchmark mode is "run for rt seconds";
#                          perturbing rt perturbs wall time 1:1.
#   --pz=, --zl=, --zu= : variable subdomain z; non-zero values rewrite
#                          the local sub-block partition -> uneven
#                          load -> changes per-step time.
#   --npx=, --npy=, --npz=: MPI process grid; sub-grids only valid for
#                          factorizations of the rank count.
# All HPCG CLI flags use `--key=value` syntax exclusively (init.cpp:91
# uses startswith / strlen + sscanf, no space-separated variant); the
# app_arg_override perturbation method replaces a whole argv slot with
# Knob: positional `nz` arg (arg_index 2), perturb 32 -> [31, 33].
# Re-enabled 2026-05-17 after discovering HPCG_Init's "MPI fallback"
# parser (init.cpp lines 84-86) accepts BOTH --nx=N and positional
# integer forms.  Switched app_args (above) to positional so
# app_arg_override works directly with no tooling extension.
#
# Timing impact: perturbing only nz (not nx, ny) gives FLOP scaling of
# (nz_perturbed / 32) -- 33/32 = +3.1% wall time, 31/32 = -3.1%.
# Well within the calibrator's 30% threshold.  And the slope-test
# ratio is invariant to uniform timing shifts anyway -- see
# docs/cold_replay_detector.md "timing invariant" discussion.
#
# Output sensitivity: HPCG outputs a CG residual norm; changing nz
# from 32 to 33 changes the problem size (32x32x32 -> 32x32x33 cells)
# which changes the discretized Laplacian's spectrum and hence the
# CG convergence trajectory.  Final residual differs by ~O(1/nz)
# relative -- comfortably above the 1000x-tolerance sensitivity floor
# for HPCG_VALIDATION numeric output.
#
# Fallback candidates if nz perturbation fails calibration:
#   1. arg_index 3 (rt = runtime cap), range [118, 122] -- smallest
#      timing delta but may produce too-small output diff if HPCG
#      runs ~same number of CG iters
#   2. arg_index 0 (nx), same range -- equivalent to nz but in a
#      different dimension; output diff identical by symmetry
#
# app_args layout: [32, 32, 32, 120] -> arg_index 2 is the nz value
# '32' as a string.
perturbation:
  method: app_arg_override
  arg_index: 2
  value_range: [31, 33]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
