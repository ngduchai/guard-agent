name: CLAMR
category: iterative_adaptive
language: cpp
description: Cell-based adaptive mesh refinement mini-app (shallow water equations)
mpi_ranks: 4
# Upstream-only opt-in flags: appended to app_args ONLY for the
# upstream-checkpointed reference build; vanilla and the LLM-baseline never
# see them.  CLAMR's Crux requires `-c <interval>` to set
# `crux_type = CRUX_DISK` (see input.cpp:309); without it, crux_type stays
# CRUX_NONE and no backup*.crx files are written, hiding the real Crux
# footprint in raw_metrics.json.  Cadence chosen to match the LLM baseline
# (every 100 cycles) for a fair per-frame size comparison.
reference_extra_args:
- -c
- '100'
build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DGRAPHICS_TYPE=None -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)
executable: ./_build/clamr_mpionly
input_subdir: null
comparison:
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla + checkpointed clamr_mpionly.cpp
  # now write 6 raw doubles (48 bytes) to "validation_output.bin" in CWD on
  # rank 0 inside the existing "Complete final output" block:
  #   [0] H_sum                            (final total mass, globally reduced)
  #   [1] H_sum_initial                    (initial total mass)
  #   [2] percent_mass_diff                (= |H_sum - H_sum_initial| / H_sum_initial * 100)
  #   [3] (double)ncycle                   (final cycle count)
  #   [4] simTime                          (final simulated time)
  #   [5] (double)ncells_global            (final number of cells)
  # H_sum is from state->mass_sum() which is globally reduced.  Inline write
  # (no helper function) since the values are all in scope at the insertion
  # point.  Legacy 'Iteration 5000' stdout keep_pattern retained as
  # informational.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - Iteration 5000
sizes:
  validation:
    description: bench workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache + bench
    # 2026-05-18 (Step 0 v8): aligned to bench workload (small size below)
    # so Step 0 vanilla signature and reference bench signature compare at
    # the SAME workload; previously was -t 5000, shorter than bench's
    # -t 6700, which would cause Step 0.6c cross-consistency failures.
    app_args:
    - -n
    - '768'
    - -t
    - '6700'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -n
    - '768'
    - -t
    - '6700'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 125.61s (mean(n=3))
#   resilient_nofail_mean    = 124.4s (failure-free overhead = -1.0%)
#   resilient_once_mean      = 131.89s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 150.74s
#   1.1 * ref_once  = 145.08s
#   cap = max(...)  = 150.74s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/CLAMR_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17, knob switched 2026-05-19).
# See docs/cold_replay_detector.md §5 + §8.
#
# Knob (2026-05-19): `-n` grid resolution, perturb 768 -> [762, 774] (+/-0.8%).
# Why switched from previous `-t 6700 -> [4975, 5025]`: that range was a
# 25% workload SHRINK (6700 -> ~5025 timesteps), blowing past the 15%
# timing-invariant threshold during calibration.  Tried `-D ndigits` next
# but it's parsed in input.cpp:281 and never used downstream (zero output
# diff -- same trap as SPARTA's `seed` knob in commit d76349a61).
#
# `-n` propagates through state->fill_circle() (initial bump radius scales
# with nx), through mesh->init() (cell count = nx*ny), and through every
# one of the 6700 timesteps' finite-difference work.  Different nx -> a
# slightly different grid + initial condition + different H_sum trajectory
# -> guaranteed huge output diff at 1e-12 tolerance.
#
# Why this range is timing-safe:
#   - workload scales O(nx^2); +/-0.8% nx -> +/-1.6% FLOPs
#   - well below the 15% timing threshold (per
#     feedback_calibrator_timing_threshold_15pct.md)
#   - AMR still has the same levmx, hash method, integrator type
#
# app_args layout: ['-n', '768', '-t', '6700'] -> arg_index 1 is the
# nx value '768' as a string; calibrator writes e.g. '768', '772', etc.
#
# Fallback candidates if calibration still fails:
#   1. Tighten `-n` further to [766, 770] (+/-0.3%)
#   2. Source-edit knob via regex_replace on clamr_mpionly.cpp:217
#      (`circ_radius = 6.0;` -> hard-coded, requires rebuild; not
#      currently supported by the calibrator -- would need infra work)
perturbation:
  method: app_arg_override
  arg_index: 1
  value_range: [762, 774]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
