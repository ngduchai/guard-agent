name: CLAMR
category: iterative_adaptive
language: cpp
description: Cell-based adaptive mesh refinement mini-app (shallow water equations)
mpi_ranks: 4
# Upstream-only opt-in flags: appended to app_args ONLY for the
# upstream-checkpointed reference build; vanilla and the LLM-baseline never
# see them.  CLAMR's Crux requires `-c <interval>` to set
# `crux_type = CRUX_DISK` (see input.cpp:309); without it, crux_type stays
# CRUX_NONE and no backup*.crx files are written, hiding the real Crux
# footprint in raw_metrics.json.  Cadence chosen to match the LLM baseline
# (every 100 cycles) for a fair per-frame size comparison.
reference_extra_args:
- -c
- '100'
build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DGRAPHICS_TYPE=None -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)
executable: ./_build/clamr_mpionly
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
  - Iteration 5000
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -n
    - '768'
    - -t
    - '5000'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -n
    - '768'
    - -t
    - '6700'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 125.61s (mean(n=3))
#   resilient_nofail_mean    = 124.4s (failure-free overhead = -1.0%)
#   resilient_once_mean      = 131.89s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 150.74s
#   1.1 * ref_once  = 145.08s
#   cap = max(...)  = 150.74s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/CLAMR_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2
