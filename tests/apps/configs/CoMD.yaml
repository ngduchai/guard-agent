name: CoMD
category: iterative_fixed
language: c
description: Classical molecular dynamics proxy app (Lennard-Jones / EAM potentials)
mpi_ranks: 4
build:
  system: make
  cmd: cd src-mpi && cp Makefile.vanilla Makefile && make
executable: ./bin/CoMD-mpi
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - Final energy
  - eFinal
  - Final atom count
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -x
    - '70'
    - -y
    - '70'
    - -z
    - '18'
    - -N
    - '1500'
    - -n
    - '100'
    - -i
    - '2'
    - -j
    - '2'
    - -k
    - '1'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -x
    - '80'
    - -y
    - '80'
    - -z
    - '20'
    - -N
    - '1500'
    - -n
    - '100'
    - -i
    - '2'
    - -j
    - '2'
    - -k
    - '1'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360
