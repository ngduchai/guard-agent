name: CoMD
category: iterative_fixed
language: c
description: Classical molecular dynamics proxy app (Lennard-Jones / EAM potentials)
mpi_ranks: 4
build:
  system: make
  cmd: cd src-mpi && cp Makefile.vanilla Makefile && make
executable: ./bin/CoMD-mpi
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - Final energy
  - eFinal
  - Final atom count
sizes:
  validation:
    description: bench workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache + bench
    # 2026-05-17: appended `-T 600` so the cold-replay perturbation has a
    # space-separated value slot to override.  arg_index=17 in the
    # perturbation: block targets the temperature value below.
    # 2026-05-18 (Step 0 v8): aligned to bench workload (small size below)
    # so Step 0 vanilla signature and reference bench signature compare at
    # the SAME workload; previously was 70x70x18, smaller than bench's
    # 80x80x20, which would cause Step 0.6c cross-consistency failures.
    app_args:
    - -x
    - '80'
    - -y
    - '80'
    - -z
    - '20'
    - -N
    - '1500'
    - -n
    - '100'
    - -i
    - '2'
    - -j
    - '2'
    - -k
    - '1'
    - -T
    - '600'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - -x
    - '80'
    - -y
    - '80'
    - -z
    - '20'
    - -N
    - '1500'
    - -n
    - '100'
    - -i
    - '2'
    - -j
    - '2'
    - -k
    - '1'
    - -T
    - '600'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 201.38s (mean(n=3))
#   resilient_nofail_mean    = 200.23s (failure-free overhead = -0.6%)
#   resilient_once_mean      = 208.23s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 241.66s
#   1.1 * ref_once  = 229.05s
#   cap = max(...)  = 241.66s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/CoMD_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8 for the methodology.
#
# Knob: initial system temperature (`-T` / `--temp`, CoMD command-line
# flag; default 600 K).  CoMD's setTemperature (initAtoms.c:147) samples
# atom velocities from a Maxwell-Boltzmann distribution with sigma
# proportional to sqrt(kB * T / m), so a small change in T shifts every
# atom's initial momentum and propagates into the final energy /
# trajectory diagnostics that the comparator inspects (Final energy,
# eFinal, Final atom count).
#
# Range: 594 - 606 K (+/-1% around the nominal 600 K).  Why narrow:
#   - Lennard-Jones liquid is sensitive to T; ±1% still produces
#     >1000x tolerance output diff (tolerance=0.001 on final energy)
#   - keeps T well clear of the freeze-out regime (~50 K) and the
#     dissociation regime (~3000 K) so vanilla exits cleanly
#   - same lattice (nx/ny/nz), same nSteps, same printRate, so the
#     execution-time invariant holds (only the velocity init changes,
#     not the integrator workload)
#
# Mechanism: app_arg_override on arg_index=17 (the '600' value in the
# appended `-T 600` pair above).  apply_perturbation() replaces
# app_args[17] with str(random_value), giving e.g. `-T 597.123`.
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(594) - Z_P(606)| > 1000 * tolerance (output diff)
#   (b) elapsed times within 5% of unperturbed baseline (600)
#   (c) no NaN/crash at either extreme
#
# If calibration fails, fallback candidates in order of preference:
#   - dt (`-D`, default 1.0 fs), tight range 0.99-1.01 fs — affects
#     per-step integration error without changing step count
#   - lat (`-l`, lattice parameter, default 3.615 A Cu) tight range
#     ±0.5% — changes density slightly, all atoms still inside box
perturbation:
  method: app_arg_override
  arg_index: 17
  value_range: [594.0, 606.0]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
