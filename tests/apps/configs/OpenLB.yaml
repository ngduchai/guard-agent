name: OpenLB
category: iterative_fixed
language: cpp
description: Lattice Boltzmann CFD framework (bstep2d example)
mpi_ranks: 4
build:
  system: make
  cmd: cp config.git.mk config.mk && sed -i 's/CXX.*:= g++/CXX := mpicxx/' config.mk && sed -i 's/CC.*:= gcc/CC := mpicc/'
    config.mk && sed -i 's/PARALLEL_MODE.*:= OFF/PARALLEL_MODE := MPI/' config.mk && make -j$(nproc) && cd examples/laminar/bstep2d
    && make -j$(nproc)
executable: ./bstep2d
input_subdir: examples/laminar/bstep2d
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
  - LatticeStatistics] step=
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    # 2026-05-17: appended `--LATTICE_RELAXATION_TIME 0.518` so the
    # cold-replay perturbation has a space-separated value slot to
    # override.  arg_index=3 in the perturbation: block targets the
    # relaxation-time value below.
    app_args:
    - --MAX_PHYS_T
    - '21'
    - --LATTICE_RELAXATION_TIME
    - '0.518'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - --MAX_PHYS_T
    - '24'
    - --LATTICE_RELAXATION_TIME
    - '0.518'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 122.23s (mean(n=1))
#   resilient_nofail_mean    = 123.37s (failure-free overhead = +0.9%)
#   resilient_once_mean      = 124.77s (mean(n=1))
#
# Cap calculation:
#   1.2 * vanilla   = 146.68s
#   1.1 * ref_once  = 137.24s
#   cap = max(...)  = 146.68s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/OpenLB_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: LBM lattice relaxation time `LATTICE_RELAXATION_TIME` (passed
# via `--LATTICE_RELAXATION_TIME` -- consumed by
# myCaseParameters.fromCLI(argc, argv) in bstep2d.cpp:344).  In BGK
# Lattice Boltzmann, the kinematic viscosity nu = (tau - 0.5) *
# c_s^2 * dt; perturbing tau in a tight range shifts the effective
# Reynolds number of the backward-facing step flow and changes the
# LatticeStatistics step= velocity/pressure diagnostics that the
# comparator reads (tolerance=0.1).
#
# Range: 0.510 - 0.526 (+/-1.5% around the bstep2d nominal 0.518).
# Why this range:
#   - tau must stay > 0.5 strictly (otherwise nu < 0 -> BGK becomes
#     anti-diffusive and the simulation blows up); the 0.510 lower
#     bound stays a safe distance from the singular point.
#   - 0.518 is the bstep2d "stable laminar" sweet spot; ±1.5% gives a
#     ~16% viscosity shift (nu ~ tau - 0.5), enough to reliably shift
#     pressure/velocity diagnostics past 1000x tolerance.
#   - same RESOLUTION (20), same DOMAIN_EXTENT, same MAX_PHYS_T,
#     same step count (lattice timesteps are derived from
#     MAX_PHYS_T / dt where dt depends on tau via the converter, but
#     for fixed RESOLUTION the simulation is bounded by MAX_PHYS_T --
#     wall time scales with #steps which is roughly constant within
#     this tau range).
#
# Mechanism: app_arg_override on arg_index=3 (the '0.518' value in
# the appended `--LATTICE_RELAXATION_TIME 0.518` pair above).
# myCaseParameters.fromCLI parses `--KEY VALUE` pairs in OpenLB
# convention (space-separated, not =), so str(value) substitution is
# correct.
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(0.510) - Z_P(0.526)| > 1000 * tolerance (0.1)
#   (b) elapsed times within 5% of unperturbed baseline (0.518)
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - PHYS_CHAR_VISCOSITY (nominal 1.0/19230.76923 = 5.2e-5), ±2%
#     directly perturbs Reynolds number — same effect as tau but at
#     the physical level
#   - PHYS_CHAR_VELOCITY (nominal 1.0), tight range 0.99-1.01:
#     Mach-number style perturbation
perturbation:
  method: app_arg_override
  arg_index: 3
  value_range: [0.510, 0.526]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
