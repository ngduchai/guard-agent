name: OpenLB
category: iterative_fixed
language: cpp
description: Lattice Boltzmann CFD framework (bstep2d example)
mpi_ranks: 4
build:
  system: make
  cmd: cp config.git.mk config.mk && sed -i 's/CXX.*:= g++/CXX := mpicxx/' config.mk && sed -i 's/CC.*:= gcc/CC := mpicc/'
    config.mk && sed -i 's/PARALLEL_MODE.*:= OFF/PARALLEL_MODE := MPI/' config.mk && make -j$(nproc) && cd examples/laminar/bstep2d
    && make -j$(nproc)
executable: ./bstep2d
input_subdir: examples/laminar/bstep2d
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
  - LatticeStatistics] step=
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - --MAX_PHYS_T
    - '21'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - --MAX_PHYS_T
    - '24'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360
