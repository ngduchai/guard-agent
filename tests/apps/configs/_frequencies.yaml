# Single source of truth for the failure-injection frequency taxonomy.
# Loaded by validation/veloc/app_config.py and applied uniformly across ALL apps.
# Per-app YAML files no longer carry their own frequencies block.
#
# Each frequency defines:
#   inject_failures      — bool; whether the runner injects any failures
#   delay_fraction       — float; injection_delay = nominal_runtime × this
#                          (for "once" this is the time-of-injection;
#                          for "multi"/"burst" this is the inter-failure period)
#   failures_count_target — int; safety bound on injections per run
#                          (the actual count delivered is the measured
#                          statistic; this just stops runaway injection)

frequencies:
  nofail:
    description: "no failures injected — error-free baseline timing"
    inject_failures: false

  once:
    description: "single failure mid-run; recovery from one checkpoint"
    inject_failures: true
    delay_fraction: 0.5
    failures_count_target: 1

  multi:
    description: "failures every nominal_runtime/4 — repeated recovery"
    inject_failures: true
    delay_fraction: 0.25
    failures_count_target: 3

  burst:
    description: "failures every nominal_runtime/7 — stress test for repeated recovery"
    inject_failures: true
    delay_fraction: 0.143
    failures_count_target: 6
