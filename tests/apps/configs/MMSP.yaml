name: MMSP
category: iterative_fixed
language: cpp
description: Mesoscale Microstructure Simulation (Cahn-Hilliard phase-field)
mpi_ranks: 4
build:
  system: make
  cmd: cd examples/phase_transitions/cahn-hilliard/convex_splitting && make parallel && (test -f test.dat || mpirun -np 1
    --oversubscribe ./parallel --example 2 test.dat)
executable: ./mmsp_run.sh
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 1000.0
  keep_patterns:
  - '0h: 0m:'
  strip_patterns:
  - '[A-Z][a-z]{2} [A-Z][a-z]{2} +[0-9]+ [0-9:]+ [0-9]{4}'
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - test.dat
    - '9000'
    - '900'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - test.dat
    - '15000'
    # Output cadence (3rd arg) = 1500 (10 dumps).  Counter-intuitive
    # finding from v19 investigation: REDUCING cadence to 5000 (3 dumps)
    # made overhead WORSE (+59% vs +40%), not better.  Root cause is
    # MPI_File_sync (hardcoded in MMSP.grid.cpp:1475+1523) — its cost
    # depends on accumulated dirty pages between syncs, not dump count.
    # More frequent syncs = each sync flushes less data = lower per-call
    # cost.  10 dumps × small-sync cost beats 3 dumps × large-sync cost.
    # MMSP source is read-only (project rule); +40% is the structural
    # floor of MMSP's checkpoint mechanism on this system.
    - '1500'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16 v3, after fixing test.dat mismatch bug).
#
# ROOT-CAUSE INVESTIGATION (supersedes prior 1.782x cap):
# The prior 1.59x apparent overhead was NOT real — it was a test.dat mismatch.
# MMSP's build step `mpirun -np 1 ./parallel --example 2 test.dat` uses a
# random seed to generate the initial Cahn-Hilliard mesh. Bench's vanilla
# (build/validation_output/MMSP_reference/build/original/) and resilient
# (build/validation_output/MMSP_reference/build/resilient/) build dirs each
# ran this independently → different test.dat files → different initial
# conditions → different simulation runtimes. Bench was comparing 65s
# (vanilla with test.dat md5 83ec...) against 105s (resilient with test.dat
# md5 5fab...). Apples-to-oranges. Per-output instrumentation confirmed
# MMSP::output() costs only ~25ms total across 10 calls — negligible.
#
# Fix applied: copied the OLDER test.dat (md5 83ec..., from build/original/)
# to all 4 MMSP test.dat locations (vanillas/, checkpointed/, build/original/,
# build/resilient/) so vanilla and ref now run from identical initial state.
#
# Re-bench at increment=1500 n=3 with synced test.dat:
#   vanilla_mean        = 65.24s (spread 0.2%)
#   resilient_nofail    = 65.30s (overhead 1.001x — effectively zero)
#   resilient_once      = 70.31s (overhead 1.078x — ~5s recovery cost)
#
# Cap calculation:
#   1.2 * vanilla   = 78.29s
#   1.1 * ref_once  = 77.34s
#   cap = max(...)  = 78.29s = 1.200x vanilla (basis: 1.2_x_vanilla)
#
# Improvement: prior 1.782x -> 1.200x. The "MPSP overhead" was a framework
# artifact, not a real performance penalty.
#
# Open issue: MMSP's stochastic --example 2 init is fragile. Future fresh
# bench builds may regenerate test.dat with new random seed, re-introducing
# the mismatch. Long-term fix: use deterministic seed in --example 2, OR
# bake test.dat into the source tree as a fixture, OR have the bench
# framework generate test.dat once and copy to both build dirs.
production_cap_ratio: 1.200
