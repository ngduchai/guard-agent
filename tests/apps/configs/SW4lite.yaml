name: SW4lite
category: iterative_fixed
language: cpp
description: Seismic wave propagation mini-app (LLNL) - 4th order finite difference
mpi_ranks: 4
build:
  system: make
  cmd: make -j$(nproc) "EXTRA_LINK_FLAGS=-lgfortran -L$HOME/.local/lib -lblas -llapack"
executable: ./optimize/sw4lite
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
  - Errors at time
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - tests/validation_test.in
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - tests/validation_test.in
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120
