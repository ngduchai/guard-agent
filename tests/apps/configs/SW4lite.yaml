name: SW4lite
category: iterative_fixed
language: cpp
description: Seismic wave propagation mini-app (LLNL) - 4th order finite difference
mpi_ranks: 4
build:
  system: make
  cmd: make -j$(nproc) "EXTRA_LINK_FLAGS=-lgfortran -L$HOME/.local/lib -lblas -llapack"
executable: ./optimize/sw4lite
input_subdir: null
comparison:
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla + checkpointed EW.C now call
  # dumpValidationSignatureBin_sw4() inside the existing
  # `if (m_point_source_test)` / `if (m_myrank == 0)` block at the end of
  # EW::timesteploop, after normOfDifference() finishes.  Writes 6 raw
  # doubles (48 bytes) to "validation_output.bin" in CWD on rank 0:
  #   [0] errInf                          (Linf error vs exact solution)
  #   [1] errL2                           (L2 error vs exact solution)
  #   [2] solInf                          (Linf norm of solution itself)
  #   [3] (double)t                       (final simulated time)
  #   [4] (double)mNumberOfTimeSteps      (timestep count)
  #   [5] (double)mNumberOfGrids          (number of refinement grids)
  # errInf/errL2/solInf are produced by normOfDifference() which calls
  # MPI_Allreduce internally; no additional reduction needed.  The signature
  # is ONLY written when m_point_source_test is true (set by the validation
  # input file's `testpointsource` directive); our validation workload
  # uses testpointsource so this always fires.  Legacy "Errors at time"
  # stdout keep_pattern retained as informational for human inspection.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - Errors at time
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - tests/validation_test.in
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - tests/validation_test.in
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 108.42s (mean(n=3))
#   resilient_nofail_mean    = 111.83s (failure-free overhead = +3.1%)
#   resilient_once_mean      = 118.07s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 130.11s
#   1.1 * ref_once  = 129.88s
#   cap = max(...)  = 130.11s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/SW4lite_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: P-wave velocity `cp` in the testpointsource material card.
# SW4lite propagates the seismic wave at speed cp (P-wave) and cs
# (S-wave); perturbing cp shifts both the wavefront arrival time at
# every grid point and the amplitude of the radiated source, which
# directly changes the "Errors at time" diagnostic that the comparator
# reads (relative L2 error vs an analytic reference, tolerance 0.01).
#
# Range: 1.58 - 1.62 (+/-1.25% around nominal 1.6).  Why narrow:
#   - SW4lite uses CFL-stable explicit FD; cfl=1.3 in the dev block is
#     already aggressive.  Sub-2% changes to cp keep dt/dx*cp well
#     under the stability limit so the integrator doesn't blow up.
#   - same grid (8x8x4, h=0.04), same time t=15.0, same explicit step
#     count -> timing-stable.
#   - cs=0.8 stays fixed so the Poisson ratio shifts only via the cp
#     change, which is physically meaningful (slight stiffness change)
#     and still produces L2-error output diff well above the 1000x
#     tolerance threshold.
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(1.58) - Z_P(1.62)| > 1000 * tolerance (1e-2)
#   (b) elapsed times within 5% of unperturbed baseline (cp=1.6)
#   (c) no NaN/crash at either extreme
#
# If calibration fails, fallback candidates in order of preference:
#   - source amplitude via t0/freq in the source card, ±2%
#   - cs (S-wave velocity, default 0.8) ±1%
#   - rho (density, default 1) ±1% — changes wave impedance
perturbation:
  method: regex_replace
  file: tests/validation_test.in
  pattern: 'cp=[0-9.eE+-]+\s+cs='
  replacement_template: 'cp={value:.4f} cs='
  value_range: [1.58, 1.62]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
