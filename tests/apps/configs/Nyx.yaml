name: Nyx
category: iterative_adaptive
language: cpp
description: AMReX cosmological hydrodynamics/N-body code
mpi_ranks: 1
build:
  system: cmake
  cmd: git init 2>/dev/null; mkdir -p _build && cd _build && cmake .. -DNyx_MPI=ON -DNyx_OMP=OFF -DNyx_HYDRO=YES -DNyx_HEATCOOL=NO
    -DNyx_SINGLE_PRECISION_PARTICLES=NO -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)
executable: ./_build/Exec/HydroTests/nyx_HydroTests
input_subdir: null
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  # 2026-05-13 (v47): added VALIDATION_SIGNATURE keep_pattern.  Vanilla
  # nyx_main.cpp now calls dumpValidationSignature(amrptr) at the end of
  # the time loop (before delete amrptr), which prints six lines of the
  # form:
  #   `VALIDATION_SIGNATURE: field=den sum=... sum2=... max=... min=... count=N`
  # ...one per conserved hydrodynamic component (den, xmom, ymom, zmom,
  # eden, eint).  Each scalar is a deterministic reduction over the FINAL
  # State_Type MultiFabs across all AMR levels and all MPI ranks.  An LLM
  # stub that initialises State_Type but skips integration produces a
  # different signature because the shock has not propagated; a stub that
  # replays captured baseline stdout would be caught by F-17 anti-replay.
  # Comparing signatures gives a content-faithful golden-vs-recovery check
  # that does not depend on per-timestep stdout chatter.  The legacy
  # per-timestep MASS/XMOM/etc. patterns are kept as redundant evidence of
  # step-by-step progress.
  keep_patterns:
  - 'VALIDATION_SIGNATURE:'
  - 'MASS        ='
  - 'XMOM        ='
  - 'YMOM        ='
  - 'RHO\*E       ='
  - 'Average     gas density'
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - Exec/HydroTests/inputs.validation
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - Exec/HydroTests/inputs.validation
    - max_step=100000
    - stop_time=64.0
    # amr.check_int=60 (Y/D-optimal, 2026-05-16). The prior comment claimed
    # the run did "~1 step/sec" — measured wrong: actual rate is 132 steps/s
    # (6617 steps in 50.7s vanilla baseline). Cost-model probe:
    #   vanilla M = 50.69s, ref no-ckpt a = 50.71s (essentially 0 overhead),
    #   ref check_int=10 (443 ckpts) wall = 51.60s -> C ~ 2 ms/ckpt.
    # tau_opt = sqrt(2*0.002*50.69) = 0.45s = 59 steps -> round to 60.
    # At check_int=60 expect ~110 ckpts, predicted wall ~50.93s (+0.5%).
    # Plenty of usable ckpts before any injection point.
    # See build/_trusted_references/Nyx_ref_yd_n1/cost_model.json
    - amr.check_int=60
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, Y/D-corrected golden reference).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Methodology (matches SAMRAI): measured cost-model components first, then
# benched reference at Y/D-optimal check_int.
#
# Cost model (build/_trusted_references/Nyx_ref_yd_n1/cost_model.json):
#   M (vanilla mean)       = 50.69s (6617 timesteps)
#   a (ref, no checkpoints) = 50.71s  (zero structural overhead)
#   C (per-ckpt cost)      = ~2 ms/ckpt at 1 MB/ckpt
#   tau_opt = sqrt(2 * 0.002 * 50.69) = 0.45 s = 59 steps -> check_int=60
#
# Golden reference bench at check_int=60, n=3 (framework_version=2026-05-15):
#   vanilla_baseline_mean    = 50.82s (runs: 50.44, 50.68, 51.32)
#   resilient_nofail_mean    = 50.78s (overhead -0.1% = effectively zero)
#   resilient_once_mean      = 53.94s (overhead +6.2% = single-failure recovery)
#   checkpoint_size_MB       = 12.17 MB
#
# Cap calculation:
#   1.2 * vanilla   = 60.98s
#   1.1 * ref_once  = 59.33s
#   cap = max(...)  = 60.98s = 1.200x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/Nyx_reference/benchmarks/raw_metrics.json
# Cost model: build/_trusted_references/Nyx_ref_yd_n1/cost_model.json
production_cap_ratio: 1.200
