name: Nyx
category: iterative_adaptive
language: cpp
description: AMReX cosmological hydrodynamics/N-body code
# 2026-05-24: bumped from mpi_ranks=1 → 4 to align with the rest of the
# suite (per-app-rank parity for the asymmetric-restart F-collective-
# restart gate and for fairness in cold-replay detection coverage).
# AMReX handles domain decomposition automatically via max_grid_size; the
# Sod-tube validation input has enough cells to decompose onto 4 ranks
# cleanly.  Re-bake of baseline_cache + re-derivation of cost-model
# tau_opt / production_cap_ratio + perturbation re-calibration required
# before iter/bench under the new rank count.
mpi_ranks: 4
build:
  system: cmake
  cmd: git init 2>/dev/null; mkdir -p _build && cd _build && cmake .. -DNyx_MPI=ON -DNyx_OMP=OFF -DNyx_HYDRO=YES -DNyx_HEATCOOL=NO
    -DNyx_SINGLE_PRECISION_PARTICLES=NO -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)
executable: ./_build/Exec/HydroTests/nyx_HydroTests
input_subdir: null
comparison:
  # 2026-05-18 (Step 0 v8): converted from stdout keep_patterns to file-based
  # binary comparison.  vanilla + checkpointed nyx_main.cpp now call
  # dumpValidationSignatureBin(amrptr) which writes 31 raw doubles
  # (248 bytes) to "validation_output.bin" in CWD on rank 0:
  #   For each of 6 conserved components (den, xmom, ymom, zmom, eden, eint)
  #   in fixed order: sum, sum², max, min, count_as_double  (30 doubles)
  #   followed by 1 final-value double: amrptr->cumTime() (final physical time)
  # Reductions use MPI_SUM/MPI_MAX/MPI_MIN via AMReX MultiFab API
  # (rank-order independent).  Cross-consistency verified against reference
  # in Step 0.6c (see _decisions.log entry for Nyx Step 0).
  # Legacy VALIDATION_SIGNATURE stdout lines are still emitted by
  # dumpValidationSignature() for backward-compat / human inspection but the
  # validator now uses the binary file path below.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
sizes:
  validation:
    # 2026-05-18 (Step 0 v8): aligned to bench workload (small size below).
    # Previously this was just `inputs.validation` (33s, cumTime=4) but
    # the bench overrides to stop_time=64.0 (50s, cumTime=64), causing
    # Step 0.6c cross-consistency failures.  Single workload = consistent
    # signatures across iter loop + bench correctness + cross-check.
    description: bench workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache + bench
    app_args:
    - Exec/HydroTests/inputs.validation
    - max_step=100000
    - stop_time=64.0
    - amr.check_int=60
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (identical to validation; kept for bench framework's per-size config)
    app_args:
    - Exec/HydroTests/inputs.validation
    - max_step=100000
    - stop_time=64.0
    # amr.check_int=60 (Y/D-optimal, 2026-05-16). The prior comment claimed
    # the run did "~1 step/sec" — measured wrong: actual rate is 132 steps/s
    # (6617 steps in 50.7s vanilla baseline). Cost-model probe:
    #   vanilla M = 50.69s, ref no-ckpt a = 50.71s (essentially 0 overhead),
    #   ref check_int=10 (443 ckpts) wall = 51.60s -> C ~ 2 ms/ckpt.
    # tau_opt = sqrt(2*0.002*50.69) = 0.45s = 59 steps -> round to 60.
    # At check_int=60 expect ~110 ckpts, predicted wall ~50.93s (+0.5%).
    # Plenty of usable ckpts before any injection point.
    # See build/_trusted_references/Nyx_ref_yd_n1/cost_model.json
    - amr.check_int=60
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, Y/D-corrected golden reference).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Methodology (matches SAMRAI): measured cost-model components first, then
# benched reference at Y/D-optimal check_int.
#
# Cost model (build/_trusted_references/Nyx_ref_yd_n1/cost_model.json):
#   M (vanilla mean)       = 50.69s (6617 timesteps)
#   a (ref, no checkpoints) = 50.71s  (zero structural overhead)
#   C (per-ckpt cost)      = ~2 ms/ckpt at 1 MB/ckpt
#   tau_opt = sqrt(2 * 0.002 * 50.69) = 0.45 s = 59 steps -> check_int=60
#
# Golden reference bench at check_int=60, n=3 (framework_version=2026-05-15):
#   vanilla_baseline_mean    = 50.82s (runs: 50.44, 50.68, 51.32)
#   resilient_nofail_mean    = 50.78s (overhead -0.1% = effectively zero)
#   resilient_once_mean      = 53.94s (overhead +6.2% = single-failure recovery)
#   checkpoint_size_MB       = 12.17 MB
#
# Cap calculation:
#   1.2 * vanilla   = 60.98s
#   1.1 * ref_once  = 59.33s
#   cap = max(...)  = 60.98s = 1.200x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/Nyx_reference/benchmarks/raw_metrics.json
# Cost model: build/_trusted_references/Nyx_ref_yd_n1/cost_model.json
production_cap_ratio: 1.200

# Cold-replay detector input perturbation (2026-05-17). See
# /home/ndhai/.claude/plans/tranquil-napping-meerkat.md for the design.
#
# Knob choice rationale: user initially proposed nyx.initial_z, but
# inputs.validation here is a Sod shock tube with cosmology disabled
# (nyx.do_grav=0, nyx.comoving_h=0, nyx.initial_z=0), so initial_z is
# structurally inert. Switched to nyx.gamma -- the gas adiabatic
# index -- which directly drives the Rankine-Hugoniot jump
# conditions of the Sod problem; small perturbations produce a clear,
# proportional change in the post-shock density/pressure that the
# validation_output.bin comparator picks up easily.
#
# Range: 1.39 - 1.41 (+/-0.7% around the nominal 1.40 = monatomic ideal
# gas). Why narrow:
#   - Sod is highly sensitive to gamma so a small range still produces
#     a large measurable output difference (passes invariant a below)
#   - keeps gamma well clear of physically meaningless values (<1, >2)
#   - same step count, same grid, same boundary handling, so the
#     execution-time invariant holds
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(1.39) - Z_P(1.41)| > 1000 * tolerance
#   (b) elapsed times within 5% of unperturbed baseline (1.40)
#   (c) no NaN/crash at either extreme
#
# If calibration fails (e.g. gamma 1.41 violates the timing invariant
# because of dt feedback through cfl), fall back candidates in order
# of preference: nyx.cfl (range 0.85-0.95), nyx.h_species
# (0.755-0.765).
perturbation:
  method: regex_replace
  file: Exec/HydroTests/inputs.validation
  pattern: 'nyx\.gamma\s*=\s*[0-9.]+'
  replacement_template: 'nyx.gamma = {value:.4f}'
  value_range: [1.39, 1.41]
  calibration:
    expected_min_output_diff: 1.0e-9
    # Reset to false 2026-05-18 (Step 0 v8): comparison method switched from
    # stdout keep_patterns to binary validation_output.bin file with tighter
    # 1e-12 tolerance.  Calibrator must re-verify under the new signal.
    safe_value_range_verified: true
