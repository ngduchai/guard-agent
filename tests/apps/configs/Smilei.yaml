name: Smilei
category: iterative_variable
language: cpp
description: ''
mpi_ranks: 4
build:
  system: make
  cmd: CXXFLAGS="-I/usr/include/hdf5/openmpi -I/usr/include/python3.12" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/openmpi
    -lhdf5 -lpython3.12" make -j$(nproc) config=verbose
executable: ./smilei
input_subdir: null
comparison:
  # 2026-05-14 (v48): file-based binary golden output.  Vanilla and
  # reference Smilei.cpp's dumpValidationSignatureSmilei now writes
  # 65 raw doubles (7 EM fields × 5 stats + 2 species × 3 quantities ×
  # 5 stats = 520 bytes) to validation_output.bin in the run cwd.
  # NumericToleranceComparator reads via np.fromfile(dtype=np.float64),
  # enforces shape parity, and diffs at relative tolerance 1e-12.
  # Closes the v47 SAMRAI-style gaming class (signature precomputation
  # + deterministic-prefix replay + final-marker suppression) — file
  # existence required, length parity enforced, no min(len) prefix
  # comparison vector available.  Stdout VALIDATION_SIGNATURE lines
  # remain as informational copies but no longer drive the verdict.
  method: numeric
  output_file: validation_output.bin
  tolerance: 1.0e-12
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - namelist_minimal.py
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - namelist_minimal.py
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 153.48s (mean(n=3))
#   resilient_nofail_mean    = 156.25s (failure-free overhead = +1.8%)
#   resilient_once_mean      = 159.59s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 184.18s
#   1.1 * ref_once  = 175.55s
#   cap = max(...)  = 184.18s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/Smilei_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: cosine perturbation amplitude `dn` in namelist_minimal.py
# (default 0.001), which sets the initial density modulation
# `number_density = cosine(1., xamplitude=dn, xlength=L)` for the
# `eon` species.  This drives a small-amplitude electrostatic Langmuir
# wave (cold-plasma); the resulting field/particle diagnostics
# (validation_output.bin: 7 EM fields x 5 stats + 2 species x 3
# quantities x 5 stats = 65 doubles) scale linearly with dn at small
# amplitude.  Tolerance is 1e-12, so the linear-response output diff
# is comfortably above 1000x threshold.
#
# Range: 9.8e-4 - 1.02e-3 (+/-2% around nominal 1.0e-3).  Why narrow:
#   - keeps the perturbation in the strictly linear regime (dn << n0)
#     so cold-plasma dispersion remains predictable and no nonlinear
#     wave breaking kicks in
#   - same grid (cell_length=0.01, grid_length=1.12 -> 112 cells),
#     same timestep (0.0095), same simulation_time (35.) -> exactly
#     the same step count -> wall-time invariant holds
#   - same particles_per_cell (10) for both species -> same memory
#     footprint, same FLOPS/step
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(9.8e-4) - Z_P(1.02e-3)| > 1000 * tolerance (1e-12)
#       (linear scaling means the output diff itself is ~1e-3 of the
#        baseline -- easily exceeds 1e-9)
#   (b) elapsed times within 5% of unperturbed baseline
#   (c) no NaN/crash at either extreme (dn small enough to avoid wave
#       steepening / particle trapping)
#
# Fallback candidates if calibration fails:
#   - `particles_per_cell = 10` on the eon species, range [9, 11]:
#     integer particle-count knob, statistically noisier diagnostics
#     but timing impact ~10% (borderline)
#   - `mass = 1836.0` on the ion species, range 1820-1852: changes
#     ion plasma frequency, affects Langmuir-wave coupling
#
# Note: deliberately NOT perturbing `timestep` (changes step count
# 1:1) or `simulation_time` (same).
perturbation:
  method: regex_replace
  file: namelist_minimal.py
  pattern: '\ndn\s*=\s*[0-9.eE+-]+'
  replacement_template: '\ndn = {value:.6e}'
  value_range: [9.8e-4, 1.02e-3]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
