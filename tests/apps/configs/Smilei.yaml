name: Smilei
category: iterative_variable
language: cpp
description: ''
mpi_ranks: 4
build:
  system: make
  cmd: CXXFLAGS="-I/usr/include/hdf5/openmpi -I/usr/include/python3.12" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/openmpi
    -lhdf5 -lpython3.12" make -j$(nproc) config=verbose
executable: ./smilei
input_subdir: null
comparison:
  # 2026-05-14 (v48): file-based binary golden output.  Vanilla and
  # reference Smilei.cpp's dumpValidationSignatureSmilei now writes
  # 65 raw doubles (7 EM fields × 5 stats + 2 species × 3 quantities ×
  # 5 stats = 520 bytes) to validation_output.bin in the run cwd.
  # NumericToleranceComparator reads via np.fromfile(dtype=np.float64),
  # enforces shape parity, and diffs at relative tolerance 1e-12.
  # Closes the v47 SAMRAI-style gaming class (signature precomputation
  # + deterministic-prefix replay + final-marker suppression) — file
  # existence required, length parity enforced, no min(len) prefix
  # comparison vector available.  Stdout VALIDATION_SIGNATURE lines
  # remain as informational copies but no longer drive the verdict.
  method: numeric
  output_file: validation_output.bin
  tolerance: 1.0e-12
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - namelist_minimal.py
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - namelist_minimal.py
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 153.48s (mean(n=3))
#   resilient_nofail_mean    = 156.25s (failure-free overhead = +1.8%)
#   resilient_once_mean      = 159.59s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 184.18s
#   1.1 * ref_once  = 175.55s
#   cap = max(...)  = 184.18s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/Smilei_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2
