name: Smilei
category: iterative_variable
language: cpp
description: ''
mpi_ranks: 4
build:
  system: make
  cmd: CXXFLAGS="-I/usr/include/hdf5/openmpi -I/usr/include/python3.12" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/openmpi
    -lhdf5 -lpython3.12" make -j$(nproc) config=verbose
executable: ./smilei
input_subdir: null
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
  - END
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - namelist_minimal.py
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - namelist_minimal.py
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 300
