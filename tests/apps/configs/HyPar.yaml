name: HyPar
category: iterative_fixed
language: cpp
description: Finite-difference PDE solver (hyperbolic-parabolic PDEs)
mpi_ranks: 1
build:
  system: cmake
  cmd: mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_MPI=ON && make -j$(nproc)
executable: ../../../build/src/HyPar
input_subdir: Examples/1D/FPDoubleWell
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
  - Finished
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args: []
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - Examples/1D/FPDoubleWell/solver.inp
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120
