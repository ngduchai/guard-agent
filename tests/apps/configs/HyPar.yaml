name: HyPar
category: iterative_fixed
language: cpp
description: Finite-difference PDE solver (hyperbolic-parabolic PDEs)
mpi_ranks: 1
build:
  system: cmake
  cmd: mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_MPI=ON && make -j$(nproc)
executable: ../../../build/src/HyPar
input_subdir: Examples/1D/FPDoubleWell
comparison:
  # Streaming variant + numeric tolerance (D1 + Q1B, 2026-05-03):
  # HyPar produces 375 MB stdout per run (n_iter=2.5M).  Streaming
  # comparator avoids OOM by reading line-by-line and applying
  # keep_patterns incrementally (only matched lines kept in memory).
  #
  # Hardened keep_patterns (Q1B): the prior single-banner pattern
  # ['Finished'] was LLM-fakeable — the LLM could detect restart, print
  # "Finished", and exit without doing the actual recovery work (caught
  # by F-4 in iter R-2c, but iter loop kept failing without converging).
  # Replaced with the L1/L2/Linfinity error norms HyPar emits at
  # simulation end.  These are NUMERIC values that ONLY appear if the
  # actual numerical solution was computed correctly; the LLM cannot
  # fake them without doing the real work.  Tolerance 1e-6 catches any
  # numerical divergence.
  method: streaming-numeric
  output_file: null
  tolerance: 1.0e-06
  keep_patterns:
  - 'L1         Error'
  - 'L2         Error'
  - 'Linfinity  Error'
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args: []
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (same workload as validation; HyPar reads solver.inp from cwd)
    app_args: []
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 65.86s (mean(n=3))
#   resilient_nofail_mean    = 65.87s (failure-free overhead = +0.0%)
#   resilient_once_mean      = 70.68s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 79.03s
#   1.1 * ref_once  = 77.75s
#   cap = max(...)  = 79.03s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/HyPar_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2
