name: HyPar
category: iterative_fixed
language: cpp
description: Finite-difference PDE solver (hyperbolic-parabolic PDEs)
# 2026-05-24: bumped from mpi_ranks=1 → 4 to align with the rest of the
# suite (per-app-rank parity for the asymmetric-restart F-collective-
# restart gate and for fairness in cold-replay detection coverage).  See
# below for the empirically-derived tolerance discussion that was originally
# written for mpi_ranks=1 — under 4-rank decomposition of the 1D
# FPDoubleWell example the L1/L2/Linf norms are still MPI_Allreduce'd
# from solver.error[], but FP-reorder noise may surface for the first
# time.  Re-bake of baseline_cache + re-derivation of the tolerance
# envelope is required before iter/bench.
mpi_ranks: 4
build:
  system: cmake
  cmd: mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_MPI=ON && make -j$(nproc)
executable: ../../../build/src/HyPar
input_subdir: Examples/1D/FPDoubleWell
comparison:
  # 2026-05-18 (Step 0 v8): converted from streaming-numeric stdout
  # comparison to file-based binary comparison. vanilla + checkpointed
  # SimulationWriteErrors.c both call dumpValidationSignatureBin_hypar(
  # sim, nsims) inside the existing `if (!rank)` block, which writes 6
  # raw doubles (48 bytes) to "validation_output.bin" in CWD on rank 0:
  #   [0] sim[0].solver.error[0]                     (L1 error)
  #   [1] sim[0].solver.error[1]                     (L2 error)
  #   [2] sim[0].solver.error[2]                     (Linfinity error)
  #   [3] (double)nsims                              (number of simulations)
  #   [4] (double)sim[0].solver.ndims                (spatial dimensions)
  #   [5] sim[0].solver.dt                           (time step size)
  # solver.error[] values come from HyPar's own end-of-run error
  # computation (already MPI-reduced). Fields [3..5] are config
  # constants (must be bit-identical between any two runs of the same
  # input). NumericToleranceComparator reads via np.fromfile(dtype=
  # np.float64), enforces shape parity, and diffs element-wise.
  #
  # 2026-05-21 (statistical recalibration): tolerance set to T = 1.0e-12
  # via the conventional GUM expanded-uncertainty framework (JCGM
  # 100:2008 §6) with Six Sigma coverage factor (k=6, ISO 13053:2011),
  # verified distribution-free by the Vysochanskij-Petunin (1980)
  # one-sided unimodal bound and Cantelli's (1910) inequality. LLM-iter
  # results are explicitly EXCLUDED from calibration — the LLM is the
  # entity being tested against this threshold, and calibrating to what
  # the LLM produced would defeat the test.
  #
  # Empirical noise envelope (build/_experiment_state/
  # hypar_tolerance_envelope.json, n=10 ref-vs-vanilla perturbed-pair
  # runs, 2026-05-21):
  #   For each of 10 perturbations drawn fresh from value_range, the
  #   reference HyPar binary (genuine upstream HyPar at build/
  #   _calibration/HyPar_reference_build/src/HyPar) is run under
  #   VANILLA's perturbed input (same FPDoubleWell example, same
  #   solver.inp, mpi_ranks=1, no restart directives → ref runs pure
  #   integration), and its output diffed against the freshly-recomputed
  #   Z_P (vanilla under the same perturbation):
  #
  #     max_abs envelope: μ=0, σ=0, min=0, max=0   (10 of 10 = 100%)
  #     max_rel envelope: μ=0, max=0
  #     worst = 0  (structural bit-equality, not FP-reorder noise)
  #
  #   Per-field breakdown (each of the 6 doubles in validation_output.bin):
  #     field[0] L1 error     : max_abs=0    (bit-identical)
  #     field[1] L2 error     : max_abs=0    (bit-identical)
  #     field[2] Linfinity    : max_abs=0    (bit-identical)
  #     field[3] nsims        : max_abs=0    (config constant)
  #     field[4] ndims        : max_abs=0    (config constant)
  #     field[5] dt           : max_abs=0    (config constant)
  #
  #   Mechanistic explanation: mpi_ranks=1 + identical perturbed input
  #   + both binaries call dumpValidationSignatureBin_hypar inside the
  #   same `if (!rank)` block on the same end-of-run solver.error[]
  #   values + neither binary triggers any checkpoint code path during
  #   failure-free execution (no kill, no restart args) → ref and
  #   vanilla compute the same numerics in the same FP order and write
  #   the same 48 bytes. Collection was stopped at n=10 of n=30 per
  #   user direction once the empirical floor was conclusively
  #   determined (additional pairs at the same observed value 0 cannot
  #   shift estimators or change the adopted tier).
  #
  # Tolerance-selection method (conventional, citable):
  # Method ranking from tightest-rejecting to safest-passing:
  #
  #   (1) NIST/SEMATECH §7.2.6.3 normal one-sided tolerance interval,
  #       Natrella (1963) approximation at (β=0.99, γ=0.95, n=30):
  #         k_1 = 3.050 → T1 = μ + 3.050σ = 0
  #       Trivially covers worst observation (0 ≥ 0) because all
  #       observations are exactly 0.
  #
  #   (2) Six Sigma convention (ISO 13053:2011, Pyzdek & Keller 2009):
  #         T2 = μ + 6σ = 0
  #       Covers worst observation; equivalent to a Vysochanskij-
  #       Petunin one-sided tail bound of 1.0% per pair under any
  #       unimodal distribution. Zero degenerate case.
  #
  #   (3) Engineering safety margin (snap up to nearest 10^k ≥
  #       max(T2, 2·worst)):
  #         T3_raw = max(0, 0) = 0  →  T3 = 1.0e-12 (machine-epsilon
  #         double-precision bit-equality floor, applied because
  #         T3_raw = 0 would reject any non-bit-exact float).
  #
  # Adopted tolerance T = T3 = 1.0e-12. Rationale: the empirical noise
  # envelope supports T=0 (bit-equality), but a literally-zero
  # tolerance is operationally fragile (any future hardware/compiler
  # change introducing ulp-level non-determinism would false-fail).
  # 1.0e-12 is ~10 ulps above the bit-equality envelope and stays
  # tighter than any other app in the suite — appropriate for an app
  # whose validation_output.bin is composed of MPI-reduced norms over
  # a single rank with no reorder freedom.
  #
  # Gaming resistance under T = 1e-12 is preserved by the perturbation
  # + v2.2 gate stack (none of which operates on output_correct):
  # (1) cold-replay produces bit-exact vanilla output → passes any
  #     tolerance trivially, but is caught by Gate B
  #     (recovery_resume_ratio / Z_P walltime < 0.85) and Gate C
  #     (ratio < 1 − kill_fraction/2);
  # (2) cached baseline replay (serve seed_A's Z_P when current cycle
  #     uses seed_B) → caught by perturbation: q ∈ [0.234, 0.246] is
  #     drawn fresh per cycle from a continuous range; the LLM cannot
  #     pre-cache the correct L1/L2/Linfinity for an unseen q;
  # (3) comparator-tautology (hand-crafted output bytes) → infeasible
  #     because solver.error[] is computed by HyPar's own MPI-reduced
  #     end-of-run routine after the full 2.5M-iteration integration.
  #
  # The legacy v48-equivalent invariants still hold:
  # (a) file existence required → LLM cannot suppress;
  # (b) length parity enforced → no prefix-only diff;
  # (c) keep_patterns informational only — verdict is on the binary file.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - 'L1         Error'
  - 'L2         Error'
  - 'Linfinity  Error'
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args: []
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (same workload as validation; HyPar reads solver.inp from cwd)
    app_args: []
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 65.86s (mean(n=3))
#   resilient_nofail_mean    = 65.87s (failure-free overhead = +0.0%)
#   resilient_once_mean      = 70.68s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 79.03s
#   1.1 * ref_once  = 77.75s
#   cap = max(...)  = 79.03s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/HyPar_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: diffusion coefficient `q` in physics.inp (the
# Fokker-Planck-double-well PDE's drift/diffusion parameter, default
# 0.24).  HyPar's fp-double-well model uses q to weight the diffusion
# vs the double-well drift in the parabolic-hyperbolic PDE; changing q
# shifts the steady-state error norms (L1/L2/Linfinity) that the
# comparator inspects.  Tolerance is 1e-6, so small changes already
# exceed 1000x threshold.
#
# Range: 0.234 - 0.246 (+/-2.5% around nominal 0.24).  Why narrow:
#   - keeps q well clear of the bifurcation regime (q -> 0 collapses
#     the double well; q >> 1 over-diffuses to a uniform state)
#   - dt=0.001 and n_iter=2.5M are fixed, par_space_scheme=2 unchanged
#     -> identical step count, same grid (size=80, ghost=3), so the
#     execution-time invariant holds
#   - L2 error in steady state scales sensitively with q (it is the
#     dominant diffusion term in the PDE), so the output diff is
#     reliably large even at +/-2.5%
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(0.234) - Z_P(0.246)| > 1000 * tolerance (1e-6)
#   (b) elapsed times within 5% of unperturbed baseline
#   (c) no NaN/crash at either extreme (in particular, very small q
#       can cause the WENO5 hyp scheme to develop spurious oscillations
#       — the 2.5% lower bound is well above that threshold)
#
# Fallback candidates if calibration fails:
#   - dt in solver.inp (default 0.001), tight range 0.00098-0.00102
#     (would also change step count to keep total time; safer to skip)
#   - The fp-double-well model has no other tunable parameter — q is
#     the only physics knob.  If q fails, mark as disabled.
perturbation:
  method: regex_replace
  file: Examples/1D/FPDoubleWell/physics.inp
  pattern: '\n\s*q\s+[0-9.eE+-]+'
  replacement_template: '\n  q {value:.6f}'
  value_range: [0.234, 0.246]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
