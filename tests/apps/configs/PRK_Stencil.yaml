name: PRK_Stencil
category: asynchronous
language: c
description: Parallel Research Kernels MPI1 Stencil — barrier-free 2D star-shaped stencil with non-blocking halo (no in-loop
  MPI_Allreduce/Barrier)
mpi_ranks: 4
build:
  system: make
  cmd: cd Stencil && make stencil
executable: ./stencil
input_subdir: Stencil
comparison:
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  vanilla + checkpointed stencil.c now call
  # dumpValidationSignatureBin(norm, reference_norm, iterations,
  # f_active_points) which writes 6 raw doubles (48 bytes) to
  # "validation_output.bin" in CWD on rank `root`:
  #   [0] norm                          (per-active-point L1 norm)
  #   [1] reference_norm                (target value, deterministic)
  #   [2] norm - reference_norm         (validation residual; should be near 0)
  #   [3] (double)iterations            (timestep count from CLI)
  #   [4] (double)f_active_points       (active grid-point count)
  #   [5] (double)(COEFX + COEFY)       (sum of stencil coefficients)
  # norm is computed via MPI_Reduce(MPI_SUM) of per-rank local_norm, then
  # divided by f_active_points on rank root.  Both vanilla and reference
  # invoke the dumper at the same code location (after bail_out(error),
  # before the performance reporting block).  Legacy "Solution validates"
  # and "Reference L1 norm" stdout keep_patterns retained as informational.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - Solution validates
  - Reference L1 norm
sizes:
  validation:
    # 2026-05-09: doubled iterations from 16500 to 33000.
    # At 16500, the workload was too short relative to fixed mpirun + MPI_Init
    # + VeloC_Init startup cost (~25s of process-spawn overhead per attempt).
    # That made the strict 1.2x kill+recovery cap structurally unreachable
    # — recovery overhead alone (25s) exceeded the 24s cap headroom.
    # At 33000 iterations, baseline runtime ~244s; cap headroom ~49s; the
    # ~25s startup cost is now within budget.  Grid (4000²) and CKPT_INTERVAL
    # (500) unchanged so the LLM-modified checkpoint code is untouched.
    description: workload sized so fixed startup cost fits within 1.2x cap
    app_args:
    - '33000'
    - '4000'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — same workload as validation
    app_args:
    - '33000'
    - '4000'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360

# Per-app production cap (2026-05-16 v2, after longer-interval sweep).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Methodology (supersedes the prior 2.040x cap at CKPT_EVERY=3000):
# The Y/D linear cost model was misleading. Longer-interval sweep
# (build/_experiment_state/prk_longer_interval_sweep.log) showed C is NOT
# linear in cadence; disk thrashing kicks in around 5+ ckpts:
#
#   CKPT_EVERY | ckpts | wall  | overhead vs vanilla=249s
#   ---        | ---   | ---   | ---
#   99999      | 0     | 249s  | baseline
#   500        | 66    | 738s  | +489s  (thrashing)
#   3000       | 11    | 370s  | +121s  (still thrashing)
#   6000       | 5     | 252s  | +3s    (sustained)
#   10000      | 3     | 246s  | ~0s    (optimal regime)
#   16500      | 2     | 247s  | ~0s
#   33000      | 1     | 273s  | +24s   (end-of-run flush penalty)
#
# Per-ckpt overhead drops sharply as cadence stretches past ~5 ckpts —
# OS dirty-page flushing has time to complete between writes.
#
# Golden bench at CKPT_EVERY=10000, n=3 (framework_version=2026-05-15):
#   vanilla_mean   = 248.19s (spread 1.3%)
#   resilient_nofail = [250.75, 248.65, 295.27]s -> spread 18%, median = 250.75s
#                      (1.01x vanilla — third run was unlucky disk-load)
#   resilient_once = [315.70, 323.17, 323.65]s -> mean = 320.84s
#                    (1.293x vanilla — kill+recovery of 256MB chk + remaining work)
#
# Cap calculation (using median for high-variance nofail per user rule):
#   1.2 * vanilla   = 297.83s
#   1.1 * ref_once  = 352.92s
#   cap = max(...)  = 352.92s = 1.422x vanilla (basis: 1.1_x_reference_once)
#
# Improvement: prior 2.040x -> 1.422x. The "Y/D" cost model gave the wrong
# answer because per-ckpt cost is non-linear in cadence on this disk.
#
# Bench env: CKPT_EVERY default is 10000 (set in run_validate.sh:314 with
# := so external CKPT_EVERY still wins). Allows manual probe overrides.
production_cap_ratio: 1.422

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: positional `iterations` arg (arg_index 0), perturb 33000 -> [32900, 33100]
# (+/-0.3%). Re-enabled 2026-05-17 after re-examining the timing invariant:
# uniform timing shifts from perturbation CANCEL in the slope-test ratio
# (both nofail_elapsed and recovery_elapsed shift by the same factor), so
# the timing-stability invariant is much weaker than initially documented.
# See docs/cold_replay_detector.md.
#
# A +/-100 iteration perturbation on a 33000-iter stencil run is +0.3%
# wall-time delta (trivially under any threshold).  Output sensitivity:
# stencil output is an L1 norm over all cells across all iterations, so
# 100 extra iterations of accumulated stencil action produces a clear,
# proportional change in the final norm.  At tolerance 0.001 (the YAML's
# numeric comparator tolerance) the diff is comfortably above the
# 1000x-tolerance sensitivity floor.
#
# Pre-computability concern: PRK Stencil's solution validates against an
# analytic reference, so a determined LLM could pre-compute the norm for
# any (iter, n) pair.  This is mitigated by the value_range being large
# enough (200 integer values) that exhaustive pre-caching is impractical
# and by the slope-test prong catching any cold-replay variant of the
# attack regardless.  Not a perfect defense but better than disabled.
#
# Fallback if iterations perturbation has too-small output diff:
#   grid size `n` (arg_index 1) +/-2 around 4000 -- +0.10% timing
#   (n^2 scaling), larger output diff (whole-grid resolution change).
#
# app_args layout: [33000, 4000] -> arg_index 0 is the iterations
# value '33000' as a string.
perturbation:
  method: app_arg_override
  arg_index: 0
  value_range: [32900, 33100]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
