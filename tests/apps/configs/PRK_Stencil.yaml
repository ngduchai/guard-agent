name: PRK_Stencil
category: asynchronous
language: c
description: Parallel Research Kernels MPI1 Stencil — barrier-free 2D star-shaped stencil with non-blocking halo (no in-loop
  MPI_Allreduce/Barrier)
mpi_ranks: 4
build:
  system: make
  cmd: cd Stencil && make stencil
executable: ./stencil
input_subdir: Stencil
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
  - Solution validates
  - Reference L1 norm
sizes:
  validation:
    description: smallest workload — used for AUDIT + ITER + baseline cache
    app_args:
    - '16500'
    - '4000'
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — bumped to match validation (was 8000² which was less than validation 16500²)
    app_args:
    - '16500'
    - '4000'
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 360
