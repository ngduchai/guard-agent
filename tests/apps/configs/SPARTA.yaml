name: SPARTA
category: iterative_variable
language: cpp
description: Direct Simulation Monte Carlo (DSMC) rarefied gas dynamics
mpi_ranks: 4
build:
  system: make
  cmd: cd src && make mpi && cp spa_mpi ../examples/free/
executable: ./spa_mpi
input_subdir: examples/free
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
  - '   20000'
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -in
    - in.validation
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (same workload as validation; cwd=examples/free via input_subdir)
    app_args:
    - -in
    - in.validation
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 111.82s (mean(n=3))
#   resilient_nofail_mean    = 112.31s (failure-free overhead = +0.4%)
#   resilient_once_mean      = 114.1s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 134.19s
#   1.1 * ref_once  = 125.51s
#   cap = max(...)  = 134.19s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/SPARTA_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: master RNG seed for the DSMC sampler (the `seed` directive on
# line 1 of in.validation, default 12345).  SPARTA is a Direct
# Simulation Monte Carlo code -- particle positions, velocities, and
# collision pair selections are all driven by RNG.  A new seed gives a
# totally different trajectory but the same expectation values; over
# 165000 timesteps with 100000 particles the deterministic step
# diagnostics (cpu / np / nattempt / ncoll / c_temp) differ enough to
# blow past the comparator's tolerance (0.1).
#
# Range: integer [10000, 999999].  Why this range:
#   - lo bound > 0 (SPARTA may reject seed=0)
#   - upper bound < 2^31 so it fits in any int representation across
#     the MPI ranks
#   - large discrete range so the LLM cannot exhaustively pre-cache
#     trajectories for every seed value
#
# Why seed is timing-safe:
#   - same particle count (100000), same grid (20x20x20), same step
#     count (165000), same vstream, same temp -> identical loop
#     structure; only random draws differ
#   - DSMC wall time is bounded by O(N_particles * N_steps), which is
#     independent of seed
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(seed_lo) - Z_P(seed_hi)| > 1000 * tolerance (0.1)
#   (b) elapsed times within 5% of unperturbed baseline (seed=12345)
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - `temp 273.15` in the mixture line, ±1% (266.7-279.5): physics
#     knob, shifts thermal velocity ~0.5%, affects collision rate
#   - `nrho 7.07043E22` (number density), ±2%: changes mean free path
perturbation:
  method: regex_replace
  file: examples/free/in.validation
  pattern: '^seed\s+[0-9]+'
  replacement_template: 'seed            {value:d}'
  value_range: [10000, 999999]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: false
