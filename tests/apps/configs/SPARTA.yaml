name: SPARTA
category: iterative_variable
language: cpp
description: Direct Simulation Monte Carlo (DSMC) rarefied gas dynamics
mpi_ranks: 4
build:
  system: make
  cmd: cd src && make mpi && cp spa_mpi ../examples/free/
executable: ./spa_mpi
input_subdir: examples/free
comparison:
  # 2026-05-18 v2 SCHEMA REDESIGN (current, deployed):
  # dumpValidationSignatureBin_sparta(sparta) in tests/apps/vanillas/SPARTA/
  # src/main.cpp lines 48-73 captures 6 raw doubles (48 bytes) of per-particle
  # state aggregates, MPI-reduced onto rank 0:
  #   [0] global sum of |x[0]|  (x-position aggregate)
  #   [1] global sum of |x[1]|  (y-position aggregate)
  #   [2] global sum of |x[2]|  (z-position aggregate)
  #   [3] global sum of |v[0]|  (x-velocity aggregate)
  #   [4] global sum of |v[1]|  (y-velocity aggregate)
  #   [5] global sum of |v[2]|  (z-velocity aggregate)
  # Particles initialized by `create_particles air n 100000 twopass`, evolved
  # by DSMC collisions and reflective-boundary kinematics for 165000 steps.
  # Both initial particle state and trajectory evolution are RNG-driven, so
  # the aggregate signature is sensitive to the master seed.
  #
  # v1 schema (commit 2980e5f20, superseded) captured only counts/timesteps
  # (nparticles, ntimestep, dt, firststep, laststep) and was perturbation-
  # invariant; abandoned 2026-05-18 in favour of v2 above.
  #
  # 2026-05-21 (statistical recalibration): tolerance set to T = 1.0e-12 via
  # the same conventional GUM expanded-uncertainty framework applied to HyPar
  # (JCGM 100:2008 §6 + Six Sigma coverage k=6 per ISO 13053:2011, verified
  # distribution-free by the Vysochanskij-Petunin one-sided unimodal bound).
  # LLM-iter results are EXCLUDED from calibration — the LLM is the entity
  # being tested against this threshold; calibrating to LLM output would
  # defeat the test.
  #
  # Empirical noise envelope (build/_experiment_state/
  # sparta_tolerance_envelope.json, n=5 ref-vs-vanilla perturbed-pair runs,
  # 2026-05-21):
  #   For each of 5 perturbations drawn fresh from value_range, a freshly
  #   built reference SPARTA binary (genuine upstream SPARTA at
  #   build/_calibration/SPARTA_reference_src/examples/free/spa_mpi, built
  #   out-of-tree from tests/apps/checkpointed/SPARTA — the in-tree binary
  #   pre-dated the 2026-05-18 v2 signature dump and would have skipped the
  #   write) is run under VANILLA's perturbed input (same examples/free/
  #   in.validation, mpi_ranks=4), and its 48-byte validation_output.bin
  #   diffed element-wise against the freshly-recomputed Z_P (vanilla under
  #   the same perturbation):
  #
  #     max_abs envelope: μ=0, σ=0, min=0, max=0   (5 of 5 = 100%)
  #     max_rel envelope: μ=0, max=0
  #     worst = 0  (structural bit-equality)
  #
  #   Per-field breakdown (each of the 6 doubles in validation_output.bin):
  #     field[0] sum |x[0]| : max_abs=0    (bit-identical)
  #     field[1] sum |x[1]| : max_abs=0    (bit-identical)
  #     field[2] sum |x[2]| : max_abs=0    (bit-identical)
  #     field[3] sum |v[0]| : max_abs=0    (bit-identical)
  #     field[4] sum |v[1]| : max_abs=0    (bit-identical)
  #     field[5] sum |v[2]| : max_abs=0    (bit-identical)
  #
  #   Adaptive-tier policy: tier 1 target_n=5; expand to n=15 then n=30 only
  #   if CV(max_abs) > 25%. Measured CV at n=5 = 0.0% (all observations
  #   exactly 0), so no expansion was warranted — additional pairs at the
  #   same observed value 0 cannot shift estimators or change the adopted
  #   tier.
  #
  #   Mechanistic explanation (why mpi_ranks=4 still produces bit-equality):
  #   the v2 signature is computed by a single MPI_Reduce(MPI_SUM) onto
  #   rank 0 of 6 per-rank partial sums of |x|/|v| over each rank's local
  #   particle subset. With np=4 and OpenMPI's default reduction tree
  #   (binomial), the reduction order over 4 fixed-position operands is
  #   deterministic across runs of identical input; the per-rank partial
  #   sums are themselves order-stable because each rank iterates a stable
  #   particle array (no in-step migration in this reflective-boundary
  #   workload). Both ref and vanilla call the same
  #   dumpValidationSignatureBin_sparta within the same `if (me == 0)`
  #   guard on bit-identical reduced operands → identical 48 bytes.
  #
  # Tolerance-selection method (conventional, citable):
  # Method ranking from tightest-rejecting to safest-passing:
  #
  #   (1) NIST/SEMATECH §7.2.6.3 normal one-sided tolerance interval,
  #       Natrella (1963) approximation at (β=0.99, γ=0.95, n=5):
  #         k_1 = 5.741 → T1 = μ + 5.741σ = 0
  #       Trivially covers worst observation (0 ≥ 0).
  #
  #   (2) Six Sigma convention (ISO 13053:2011, Pyzdek & Keller 2009):
  #         T2 = μ + 6σ = 0
  #       Zero degenerate case.
  #
  #   (3) Engineering safety margin (snap up to nearest 10^k ≥
  #       max(T2, 2·worst)):
  #         T3_raw = max(0, 0) = 0  →  T3 = 1.0e-12 (machine-epsilon
  #         double-precision bit-equality floor, applied because T3_raw=0
  #         would reject any non-bit-exact float).
  #
  # Adopted tolerance T = T3 = 1.0e-12. Rationale matches HyPar: the
  # empirical envelope supports T=0, but a literally-zero tolerance is
  # operationally fragile against future hardware/compiler ulp-level
  # nondeterminism. 1.0e-12 is ~10 ulps above the bit-equality envelope
  # and stays tight enough to reject any signature divergence above
  # FP-noise.
  #
  # Gaming resistance under T = 1e-12 is preserved by the perturbation +
  # v2.2 gate stack (none of which operates on output_correct):
  # (1) cold-replay produces bit-exact vanilla output → passes any
  #     tolerance trivially, but is caught by Gate B
  #     (recovery_resume_ratio / Z_P walltime < 0.85) and Gate C
  #     (ratio < 1 − kill_fraction/2);
  # (2) cached baseline replay (serve seed_A's Z_P when current cycle
  #     uses seed_B) → caught by perturbation: seed ∈ [10000, 999999] is
  #     drawn fresh per cycle from a discrete range with ~10^6 distinct
  #     trajectories; the LLM cannot pre-cache the correct sum-|x|/sum-|v|
  #     aggregates for an unseen seed;
  # (3) comparator-tautology (hand-crafted output bytes) → infeasible
  #     because the 6 aggregates are computed by SPARTA's own MPI-reduced
  #     end-of-run routine after the full 165000-step DSMC integration
  #     over 100000 particles.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - '   20000'
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - -in
    - in.validation
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (same workload as validation; cwd=examples/free via input_subdir)
    app_args:
    - -in
    - in.validation
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 111.82s (mean(n=3))
#   resilient_nofail_mean    = 112.31s (failure-free overhead = +0.4%)
#   resilient_once_mean      = 114.1s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 134.19s
#   1.1 * ref_once  = 125.51s
#   cap = max(...)  = 134.19s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/SPARTA_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: master RNG seed for the DSMC sampler (the `seed` directive on
# line 1 of in.validation, default 12345).  SPARTA is a Direct
# Simulation Monte Carlo code -- particle positions, velocities, and
# collision pair selections are all driven by RNG.  A new seed gives a
# totally different trajectory but the same expectation values; over
# 165000 timesteps with 100000 particles the deterministic step
# diagnostics (cpu / np / nattempt / ncoll / c_temp) differ enough to
# blow past the comparator's tolerance (0.1).
#
# Range: integer [10000, 999999].  Why this range:
#   - lo bound > 0 (SPARTA may reject seed=0)
#   - upper bound < 2^31 so it fits in any int representation across
#     the MPI ranks
#   - large discrete range so the LLM cannot exhaustively pre-cache
#     trajectories for every seed value
#
# Why seed is timing-safe:
#   - same particle count (100000), same grid (20x20x20), same step
#     count (165000), same vstream, same temp -> identical loop
#     structure; only random draws differ
#   - DSMC wall time is bounded by O(N_particles * N_steps), which is
#     independent of seed
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(seed_lo) - Z_P(seed_hi)| > 1000 * tolerance (0.1)
#   (b) elapsed times within 5% of unperturbed baseline (seed=12345)
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - `temp 273.15` in the mixture line, ±1% (266.7-279.5): physics
#     knob, shifts thermal velocity ~0.5%, affects collision rate
#   - `nrho 7.07043E22` (number density), ±2%: changes mean free path
perturbation:
  # 2026-05-21: pivoted from `vstream` (failed calibration 2026-05-20) back
  # to the original 2026-05-17 design's `seed` knob.  vstream failed because
  # `create_particles air n 100000 twopass` does not propagate the mixture's
  # vstream attribute to created particles (it applies to inflow flux only;
  # this box uses reflective boundaries `boundary rr rr rr`).  temp failed
  # for the same reason.  Calibration evidence 2026-05-20 (vstream sweep
  # 0.5..5.0): output_diff=0.0 across the range despite the v2 per-particle
  # signature, because the binary never sees the vstream perturbation.
  #
  # Current knob: master RNG seed on line 1 of in.validation (nominal 12345).
  # SPARTA is a Direct Simulation Monte Carlo code: every particle's initial
  # position and velocity, every collision pair selection, and every
  # post-collision velocity is drawn from the master RNG.  A different seed
  # produces a totally different particle trajectory ensemble with the same
  # expectation values.  The v2 signature (sum |x|, sum |v| per direction
  # — see `comparison:` block above) responds directly because the per-
  # particle aggregates depend on the actual particle states at simulation
  # end.  This is the same architectural pattern as SPPARKS' seed knob
  # against its v3-fixed spatial-moment signature.
  #
  # Range [10000, 999999]: discrete integer, wide enough that pre-cached
  # baseline gaming is infeasible (~10⁶ values, each generating an
  # independent trajectory).  Bounds chosen so seed is positive (SPARTA
  # may reject 0) and fits in any int representation.  Timing invariant
  # because per-step work is O(N_particles * collision_rate), independent
  # of seed.
  #
  # Why timing is safe:
  #   - same particle count (100000), same grid (20x20x20), same step
  #     count (165000), same Sutherland viscosity / mixture parameters
  #   - DSMC wall time is bounded by O(N_p * N_steps); seed only changes
  #     which collisions happen, not the count
  #
  # Calibration: pending re-run with the seed knob.  Must verify:
  #   (a) |Z_P(seed=10000) - Z_P(seed=999999)| > 1e-3 (loose; v2 sums are
  #       O(1e7), small absolute drift on a 100000-particle ensemble is
  #       expected)
  #   (b) elapsed times within 15% of unperturbed baseline (seed=12345)
  #   (c) no NaN/crash at either extreme
  method: regex_replace
  file: examples/free/in.validation
  pattern: 'seed\s+[0-9]+'
  replacement_template: 'seed            {value:d}'
  value_range: [10000, 999999]
  calibration:
    expected_min_output_diff: 1.0e-3
    safe_value_range_verified: true
