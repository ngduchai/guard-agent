name: SAMRAI
category: iterative_adaptive
language: cpp
description: Structured AMR application infrastructure (LLNL)
mpi_ranks: 4

# Per-app production cap (2026-05-16 v3, Y/D-corrected with number_of_runs=1
# strip applied to reference).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# v2's 2.541x cap was INFLATED by an upstream testing artifact: SAMRAI's
# LinAdv main.cpp had `const int number_of_runs = 2;` at line 175 with
# `for (int run = 0; run < number_of_runs; ++run)` at line 184 — a self-soak
# wrapper that ran the simulation TWICE per invocation, regardless of restart
# args. Both iterations were identical fresh runs in our bench (argc==2). See
# build/_experiment_state/samrai_phase_analysis.md for the phase-timing
# proof. Setting number_of_runs=1 cuts wall time in half AND removes the
# per-step overhead claim from v2's analysis.
#
# Cost-model probe (build/_trusted_references/SAMRAI_ref_yd_n1/cost_model.json):
#   M (vanilla)              = 82.99s (probe, n=2)
#   a (ref, no checkpoints)  = 82.81s (~zero structural overhead)
#   C (probe-measured)       = 0.734 s/ckpt at interval=10 (44 ckpts)
#   tau_opt = sqrt(2 * 0.734 * 82.99) = 11.04s = 59 steps -> interval=60
#
# Golden reference bench at restart_interval=60, n=3 (number_of_runs=1):
#   vanilla_mean        = 82.30s (low variance 0.9%)
#   resilient_nofail    = 101.96s (overhead 1.239x, spread 0.27%)
#   resilient_once      = 111.35s (overhead 1.353x, spread 0.66%)
#
# Note: bench's effective C/ckpt is ~2.7s (higher than probe's 0.73s),
# possibly due to bench-framework per-ckpt sync overhead. Still well within
# Y/D-optimal regime.
#
# Cap calculation:
#   1.2 * 82.30 =  98.76s
#   1.1 * 111.35 = 122.49s
#   cap = max(...) = 122.49s = 1.488x vanilla (basis: 1.1_x_reference_once)
#
# This is a 41% reduction from v2's 2.541x cap, putting SAMRAI in line with
# the other apps (Nyx 1.20x, MMSP 1.78x, PRK_Stencil 2.04x, SPPARKS 1.67x).
production_cap_ratio: 1.488

build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON && make -j$(nproc)
executable: ./_build/bin/linadv
input_subdir: null
comparison:
  # 2026-05-14 (v48): switched from stdout keep_pattern extraction to a
  # dedicated binary golden file, per user methodology pivot.  Vanilla
  # LinAdv::dumpValidationSignature now writes 5 raw doubles
  # (sum, sum², max, min, count-as-double = 40 bytes) to
  # validation_output.bin in the run cwd.  NumericToleranceComparator
  # reads via np.fromfile(dtype=np.float64), enforces shape parity, and
  # diffs element-wise.
  #
  # 2026-05-21 (statistical recalibration, supersedes the 2026-05-21 ad-hoc
  # 1e-3 which used a 20× heuristic headroom on the worst observation):
  # tolerance set to T = 1e-4 via the conventional GUM expanded-uncertainty
  # framework (JCGM 100:2008 §6) with Six Sigma coverage factor (k=6,
  # ISO 13053:2011), verified distribution-free by the Vysochanskij-Petunin
  # (1980) one-sided unimodal bound and Cantelli's (1910) inequality.
  # LLM-iter results are explicitly EXCLUDED from calibration — the LLM is
  # the entity being tested against this threshold, and calibrating to what
  # the LLM produced would defeat the test.
  #
  # Empirical noise envelope (build/_experiment_state/samrai_tolerance_envelope.json,
  # n=30 ref-vs-vanilla perturbed-pair runs, 2026-05-21):
  #   For each of the 30 perturbations the iter loop actually applied
  #   across iter_1..iter_30 of the most recent SAMRAI_baseline run,
  #   reference (genuine native-ckpt SAMRAI at build/validation_output/
  #   SAMRAI_reference/build/resilient/_build/bin/linadv) is run under
  #   VANILLA's perturbed input (same grid 600×420, same end_time=10.0,
  #   restart directives absent → ref runs pure integration), and its
  #   output diffed against the cached Z_P (vanilla under the same
  #   perturbation):
  #
  #     max_abs envelope: μ=7.24e-6, σ=9.52e-6, min=0, max=5.05e-5
  #     max_rel envelope: μ=3.05e-15, max=1.37e-14
  #     worst = μ + 4.55σ  (heavier-tailed than Gaussian)
  #
  #   Per-field breakdown (vanilla writes [sum, sum², max, min, count]):
  #     field[0] sum   : max_abs=3.80e-7  (rel 7.4e-15 vs ~5.1e+7)
  #     field[1] sum²  : max_abs=5.05e-5  (rel 1.4e-14 vs ~3.7e+9)  ← dominant
  #     field[2] max   : 0.000e+0          (bit-identical, comparison-only)
  #     field[3] min   : 0.000e+0          (bit-identical, comparison-only)
  #     field[4] count : 0.000e+0          (bit-identical, integer)
  #   All measured noise is at machine-epsilon relative scale; the
  #   absolute number is large only because sum² accumulates O(3.7e+9).
  #
  # Tolerance-selection method (conventional, citable):
  # Method ranking from tightest-rejecting to safest-passing:
  #
  #   (1) NIST/SEMATECH §7.2.6.3 normal one-sided tolerance interval,
  #       Natrella (1963) approximation at (β=0.99, γ=0.95, n=30):
  #         k_1 = 3.050 → T = μ + 3.050σ = 3.63e-5
  #       FAILS to cover worst observation (5.05e-5).  Empirical evidence
  #       that the noise distribution is heavier-tailed than Gaussian; the
  #       normal-TI is therefore inadequate as the sole criterion.
  #
  #   (2) Six Sigma convention (ISO 13053:2011, Pyzdek & Keller 2009):
  #         T = μ + 6σ = 6.44e-5
  #       Covers worst observation with 27% margin.  Equivalent to a
  #       Vysochanskij-Petunin one-sided tail bound of 1.0% per pair
  #       under any unimodal distribution.
  #
  #   (3) Engineering safety margin (round up to nearest 10^k):
  #         T = 1.0e-4
  #       Properties:
  #         - 9.75σ above empirical mean
  #         - 1.98× empirical worst (engineering "double the worst" rule)
  #         - V-P unimodal one-sided bound: P(false-fail) ≤ 0.46% per pair
  #         - Cantelli (1910) distribution-free bound: ≤ 1.04% per pair
  #
  # Gaming resistance under T = 1e-4 is preserved by the perturbation +
  # v2.2 gate stack (none of which operates on output_correct):
  # (1) cold-replay produces bit-exact vanilla output → passes any
  #     tolerance trivially, but is caught by Gate B
  #     (recovery_resume_ratio / Z_P walltime < 0.85) and Gate C
  #     (ratio < 1 − kill_fraction/2);
  # (2) cached baseline replay (serve seed_A's Z_P when current cycle
  #     uses seed_B) → caught by perturbation: 100 sampled cross-
  #     perturbation Z_P diffs have min max_abs = 1.17e+6, mean = 8.07e+7
  #     (vs. tolerance 1e-4 → 1.2e+10× separation from honest noise);
  # (3) comparator-tautology (hand-crafted output bytes) → infeasible
  #     because the perturbation value (advection_velocity_x in [1.95,
  #     2.05]) is drawn fresh per cycle from a continuous range; the
  #     LLM cannot pre-cache the correct sum² for an unseen value.
  #
  # The legacy v48 invariants still hold:
  # (a) file existence required → LLM cannot suppress;
  # (b) length parity enforced → no prefix-only diff;
  # (c) keep_patterns informational only — verdict is on the binary file.
  method: numeric
  output_file: validation_output.bin
  tolerance: 1.0e-4
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - validation_inputs/linadv.2d.input
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - validation_inputs/linadv.2d.input
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 600

# Cold-replay detector input perturbation (2026-05-17). See
# /home/ndhai/.claude/plans/tranquil-napping-meerkat.md for the design.
#
# Knob: x-component of LinAdv's constant advection velocity. Range
# +/-2.5% around the nominal 2.0e0. Why this knob:
#   - physics parameter (changes the solution everywhere, not just init)
#   - does NOT change grid, refinement pattern, or step count, so it
#     stays inside the +/-5% execution-time invariant the slope test
#     requires
#   - continuous range so the LLM cannot exhaustively pre-cache outputs
#   - accumulated phase error in the final field over end_time is easy
#     to detect via the existing validation_output.bin comparator
#
# Calibration: pending. When run, the calibrator must verify:
#   (a) |Z_P(1.95) - Z_P(2.05)| > 1000 * tolerance (output meaningfully
#       different)
#   (b) elapsed times within 5% of unperturbed baseline
#   (c) no NaN/crash at either extreme
perturbation:
  method: regex_replace
  file: validation_inputs/linadv.2d.input
  pattern: 'advection_velocity\s*=\s*[0-9.e+-]+\s*,\s*[0-9.e+-]+'
  replacement_template: 'advection_velocity = {value:.4e} , 1.0e0'
  value_range: [1.95, 2.05]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
