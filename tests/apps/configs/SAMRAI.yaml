name: SAMRAI
category: iterative_adaptive
language: cpp
description: Structured AMR application infrastructure (LLNL)
mpi_ranks: 4

# Per-app production cap (2026-05-16 v3, Y/D-corrected with number_of_runs=1
# strip applied to reference).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# v2's 2.541x cap was INFLATED by an upstream testing artifact: SAMRAI's
# LinAdv main.cpp had `const int number_of_runs = 2;` at line 175 with
# `for (int run = 0; run < number_of_runs; ++run)` at line 184 — a self-soak
# wrapper that ran the simulation TWICE per invocation, regardless of restart
# args. Both iterations were identical fresh runs in our bench (argc==2). See
# build/_experiment_state/samrai_phase_analysis.md for the phase-timing
# proof. Setting number_of_runs=1 cuts wall time in half AND removes the
# per-step overhead claim from v2's analysis.
#
# Cost-model probe (build/_trusted_references/SAMRAI_ref_yd_n1/cost_model.json):
#   M (vanilla)              = 82.99s (probe, n=2)
#   a (ref, no checkpoints)  = 82.81s (~zero structural overhead)
#   C (probe-measured)       = 0.734 s/ckpt at interval=10 (44 ckpts)
#   tau_opt = sqrt(2 * 0.734 * 82.99) = 11.04s = 59 steps -> interval=60
#
# Golden reference bench at restart_interval=60, n=3 (number_of_runs=1):
#   vanilla_mean        = 82.30s (low variance 0.9%)
#   resilient_nofail    = 101.96s (overhead 1.239x, spread 0.27%)
#   resilient_once      = 111.35s (overhead 1.353x, spread 0.66%)
#
# Note: bench's effective C/ckpt is ~2.7s (higher than probe's 0.73s),
# possibly due to bench-framework per-ckpt sync overhead. Still well within
# Y/D-optimal regime.
#
# Cap calculation:
#   1.2 * 82.30 =  98.76s
#   1.1 * 111.35 = 122.49s
#   cap = max(...) = 122.49s = 1.488x vanilla (basis: 1.1_x_reference_once)
#
# This is a 41% reduction from v2's 2.541x cap, putting SAMRAI in line with
# the other apps (Nyx 1.20x, MMSP 1.78x, PRK_Stencil 2.04x, SPPARKS 1.67x).
production_cap_ratio: 1.488

build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON && make -j$(nproc)
executable: ./_build/bin/linadv
input_subdir: null
comparison:
  # 2026-05-14 (v48): switched from stdout keep_pattern extraction to a
  # dedicated binary golden file, per user methodology pivot.  Vanilla
  # LinAdv::dumpValidationSignature now writes 5 raw doubles
  # (sum, sum², max, min, count-as-double = 40 bytes) to
  # validation_output.bin in the run cwd.  NumericToleranceComparator
  # reads via np.fromfile(dtype=np.float64), enforces shape parity, and
  # diffs element-wise at relative tolerance 1e-12.  This closes the
  # v47 SAMRAI gaming class (signature precomputation + 40-step
  # deterministic-prefix replay + final-marker suppression) because:
  # (1) file existence is required → LLM cannot suppress;
  # (2) length parity enforced → no min(len) prefix-only diff;
  # (3) 1e-12 tolerance + raw doubles → no precision loss, no
  #     rounding for the LLM to slip in fabricated values without
  #     incurring detectable drift;
  # (4) keep_patterns no longer drives the verdict — the noisy stdout
  #     stream is informational only.
  method: numeric
  output_file: validation_output.bin
  tolerance: 1.0e-12
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - validation_inputs/linadv.2d.input
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - validation_inputs/linadv.2d.input
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 600
