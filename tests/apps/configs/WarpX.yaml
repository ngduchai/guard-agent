name: WarpX
category: iterative_adaptive
language: cpp
description: Advanced electromagnetic Particle-In-Cell code (AMReX-based)
# 2026-05-24: bumped from mpi_ranks=1 → 4 to align with the rest of the
# suite (per-app-rank parity for the asymmetric-restart F-collective-
# restart gate and for fairness in cold-replay detection coverage).
# AMReX handles 2D domain decomposition automatically; n_cell=384x384
# decomposes cleanly onto 4 ranks (96x192 boxes).  v2 schema slots [1..5]
# are MultiFab::sum() which does MPI_Allreduce internally → rank-agnostic
# values; slot [0] is gett_new(0)*1e11 (scalar simulation time, rank-
# invariant).  Re-bake baseline_cache + recheck production_cap_ratio
# before iter/bench under the new rank count.
mpi_ranks: 4
build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DWarpX_MPI=ON -DWarpX_COMPUTE=NOACC -DWarpX_DIMS=2 -DWarpX_EB=OFF -DWarpX_QED=OFF
    -DWarpX_OPENPMD=OFF -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)
executable: ./_build/bin/warpx.2d.MPI.NOACC.DP.PDP
input_subdir: null
comparison:
  # Replaced 'completed successfully' (banner, F-3 risk) with the per-step
  # marker that WarpX emits every timestep: 'STEP N ends. TIME = X DT = Y'
  # gives step counter + simulation time + timestep size.  All deterministic
  # given fixed dt + initial conditions, both vanilla and LLM-modified must
  # emit identical values to pass.  Numeric method with 0.001 tolerance
  # accommodates floating-point representation variance.
  # Resolves R-1 audit FAIL_ACCURACY_MISMATCH + R-2 iter inability to
  # converge (15 iters all failed because no LLM modification could produce
  # text-identical 'completed successfully' surrounding context).
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.
  #
  # SCHEMA REDESIGN (v2, was v1 = commit c79659fe5): v1 schema captured
  # 5 config invariants + 1 tiny state field (gett_new ~1e-11), making
  # perturbation Step B calibration FAIL (max diff 1.5e-13 vs threshold
  # 1e-9, 5 OOM gap). v2 captures STATE-DERIVED EM field sums (responsive
  # to physics perturbations via CFL→dt→field evolution) plus a scaled
  # time field. vanilla + checkpointed main.cpp write 6 raw doubles
  # (48 bytes) to "validation_output.bin" in CWD on rank 0:
  #   [0] gett_new(0) * 1e11                     (final time, scaled)
  #   [1] sum(Efield_fp x-comp, level 0)         (global MPI-reduced)
  #   [2] sum(Efield_fp y-comp, level 0)
  #   [3] sum(Efield_fp z-comp, level 0)
  #   [4] sum(Bfield_fp x-comp, level 0)
  #   [5] sum(Bfield_fp z-comp, level 0)
  # MultiFab::sum() does MPI_Allreduce internally so values are global.
  # For pure-vacuum validation input (current default test_input/
  # inputs_validation: no particles, no laser, no external fields),
  # fields [1..5] are zero; the scaled time field [0] still moves with
  # perturbation enough to pass the 1e-9 calibration threshold.
  # Legacy 'ends. TIME =' keep_pattern retained as informational.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-12
  keep_patterns:
  - 'ends. TIME ='
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - test_input/inputs_validation
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - test_input/inputs_validation
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-12):
#   vanilla_baseline_mean    = 126.78s (mean(n=3))
#   resilient_nofail_mean    = 127.5s (failure-free overhead = +0.6%)
#   resilient_once_mean      = 130.36s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 152.14s
#   1.1 * ref_once  = 143.4s
#   cap = max(...)  = 152.14s = 1.2x vanilla (basis: 1.2_x_vanilla)
#
# Source: build/validation_output/WarpX_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.2

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: simulation-domain upper-corner extent `geometry.prob_hi`
# (default `20.e-6 20.e-6`, i.e. a 40e-6 m x 40e-6 m square box in 2D).
# WarpX/AMReX picks dt from the CFL condition (dt = CFL *
# dx / c) where dx = (prob_hi[0] - prob_lo[0]) / n_cell[0]; perturbing
# prob_hi shifts dx (n_cell stays 384x384), which shifts dt and so
# also the total simulated time (max_step * dt) reported in the
# `STEP N ends. TIME = X DT = Y` lines the comparator inspects
# (tolerance 0.001).  Step count is fixed at max_step=50000, so wall
# time is invariant to within the per-step FLOPS variation (which is
# constant since n_cell is unchanged).
#
# Range: 19.5e-6 - 20.5e-6 (+/-2.5% around the nominal 20.e-6 in each
# dimension).  Why narrow:
#   - prob_hi must stay > prob_lo (currently -20.e-6) by a margin much
#     larger than several Debye lengths; ±2.5% keeps the box ~20e-6 m
#     wide, large enough for periodic boundary conditions to work
#   - sub-2.5% shift in dx keeps the CFL safely under any sub-cycling
#     boundary in WarpX's Yee solver
#   - same n_cell (384x384), same max_step (50000), same EB/QED
#     flags -> identical loop structure; only dx/dt change
#
# Important: we perturb ONLY the upper-corner X and Y values
# symmetrically (a single regex pass replaces both numbers with the
# same value).  Asymmetric domain would change the aspect ratio and
# potentially trigger AMReX boxsize warnings.
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(19.5e-6) - Z_P(20.5e-6)| > 1000 * tolerance (1e-3)
#       — TIME at end-of-run should differ by ~2.5% so this passes
#         comfortably for the TIME field; verify also that other
#         comparator-visible fields (DT) differ proportionally.
#   (b) elapsed times within 5% of unperturbed baseline
#   (c) no NaN/crash at either extreme
#
# Fallback candidates if calibration fails:
#   - Appending `warpx.cfl = 0.999` to app_args via app_arg_override
#     (would need same trick as CoMD: extend app_args with a flag +
#     value pair, perturb the value).  warpx.cfl directly shifts dt
#     within fixed step count -> same wall time.
#   - geometry.prob_lo (default `-20.e-6 -20.e-6`), symmetric shift
perturbation:
  method: regex_replace
  file: test_input/inputs_validation
  pattern: 'geometry\.prob_hi\s*=\s*[0-9.eE+-]+\s+[0-9.eE+-]+'
  replacement_template: 'geometry.prob_hi =  {value:.4e}  {value:.4e}'
  value_range: [1.95e-5, 2.05e-5]
  calibration:
    expected_min_output_diff: 1.0e-9
    safe_value_range_verified: true
