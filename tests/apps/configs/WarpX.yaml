name: WarpX
category: iterative_adaptive
language: cpp
description: Advanced electromagnetic Particle-In-Cell code (AMReX-based)
mpi_ranks: 1
build:
  system: cmake
  cmd: mkdir -p _build && cd _build && cmake .. -DWarpX_MPI=ON -DWarpX_COMPUTE=NOACC -DWarpX_DIMS=2 -DWarpX_EB=OFF -DWarpX_QED=OFF
    -DWarpX_OPENPMD=OFF -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)
executable: ./_build/bin/warpx.2d.MPI.NOACC.DP.PDP
input_subdir: null
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
  - completed successfully
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - test_input/inputs_validation
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier
    app_args:
    - test_input/inputs_validation
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120
