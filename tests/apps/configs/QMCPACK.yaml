name: QMCPACK
category: iterative_fixed
language: cpp
description: Quantum Monte Carlo simulation package
mpi_ranks: 1
# Reference bench checkpointing is enabled via the patches overlay at
# tests/apps/patches/QMCPACK/examples/molecules/He/he_simple_opt.xml,
# which adds the `checkpoint="0"` attribute to the `<qmc>` element of
# the vanilla input.  The overlay preserves the workload (samples,
# blocks, timestep) so reference timing remains comparable to vanilla;
# only the checkpoint-write side-effect is added.  No app_args change
# needed.
build:
  system: cmake
  cmd: bash build_qmcpack.sh
executable: ../../../build/bin/qmcpack
input_subdir: examples/molecules/He
comparison:
  # 2026-05-08: replaced banner-style 'completed successfully' (LLM-fakeable;
  # the comparator just text-equality on that line) with the science-y
  # energy values from QMCPACK's optimizer output.  Across resilient_clean
  # vs resilient (post-recovery) the energies are stable to 0.23% max
  # relative diff.  variance values were not used: they have 5-10%
  # stochasticity inherent to QMC variance estimation.  1% tolerance
  # leaves headroom for stochastic noise without admitting gaming.
  # 2026-05-18 (Step 0 v8): converted from stdout numeric comparison to
  # file-based binary comparison.  6 doubles, all config-derived.
  # 2026-05-21 (Step 0 v9 / QMCPACK-A): augmented schema to 8 doubles
  # (64 bytes) so the comparator is sensitive to input perturbation
  # (the v8 6-double CONFIG-only schema was invariant under any
  # non-crashing perturbation, which is what blocked v2.2 cold-replay
  # detection on QMCPACK — calibrator's output_sensitivity_ok invariant
  # could never be satisfied).  Layout (rank-root-only):
  #   [0] (double)qmcComm->size()      (MPI ranks)
  #   [1] (double)inputs.size()        (number of <qmc> input files)
  #   [2] (double)(qmcSuccess ? 1.0 : 0.0)  (always 1.0 if we reach the dump)
  #   [3] (double)argc                 (command-line arg count)
  #   [4] (double)series_count         (number of <title>.s*.scalar.dat files)
  #   [5] (double)block_count          (total LocalEnergy rows summed across all series)
  #   [6] (double)trajectory_sum       (sum of column 1 'LocalEnergy' across every block of every series)
  #   [7] (double)0.0                  (reserved)
  # The trajectory_sum is COMPUTED BY THE SIMULATION: the linear
  # optimizer reads the starting Jastrow B (the perturbation knob below),
  # runs 60 loop iterations, and emits per-block LocalEnergy values that
  # depend on B.  Cold-replay produces correct values too (deterministic),
  # but cold-replay is now caught by the v2.2 Gate B / Gate C timing
  # ratios — comparator's job is just "output is correct given input".
  # Determinism across runs (Z_P recompute vs Z_R post-recovery) is
  # enforced by <random seed="42" parallel="false"/> in the vanilla and
  # patched input files; without that, wall-clock seeding drifts the
  # block-summed LocalEnergy by O(1e-5 relative) per the 2026-05-21
  # measurement of two same-input runs (sum -1.8696e+04 vs -1.8703e+04).
  # Tolerance: atol=1e-3 absolute, rtol=1e-6 relative.  Justification:
  # under fixed seed, the trajectory_sum is bit-exact across runs (no
  # statistical noise budget needed); atol=1e-3 covers floating-point
  # reordering at MPI_ranks=1 (single-rank reduction is associative);
  # rtol=1e-6 covers any incidental fp-determinism slip in the optimizer
  # solver.  The B perturbation (0.81 → 0.83) shifts trajectory_sum by
  # O(1.0) absolute (calibrator measures), so 1e-3 tolerance leaves 3
  # orders of headroom while still rejecting wrong-input replays.
  # Legacy 'reference energy' keep_pattern retained as informational.
  method: numeric-tolerance
  output_file: validation_output.bin
  tolerance: 1.0e-3
  keep_patterns:
  - reference energy
sizes:
  validation:
    description: smallest workload — used for AUDIT (vanilla strip verification) + ITER + baseline cache
    app_args:
    - he_simple_opt.xml
    nominal_runtime_s: null
  small:
    description: first benchmark cycle — fast tier (same workload as validation; cwd=examples/molecules/He via input_subdir)
    app_args:
    - he_simple_opt.xml
    nominal_runtime_s: null
  medium:
    description: 'TODO: scaled-up workload (~3-5× small) for second benchmark cycle'
    app_args: null
    nominal_runtime_s: null
  large:
    description: 'TODO: largest workload (~10× small) for third benchmark cycle'
    app_args: null
    nominal_runtime_s: null
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120

# Per-app production cap (2026-05-16, derived from existing reference bench data).
# Formula: cap = max(1.2 * vanilla, 1.1 * reference_failure_injected)
#
# Reference data (framework_version=2026-05-02):
#   vanilla_baseline_mean    = 106.31s (mean(n=3))
#   resilient_nofail_mean    = 111.1s (failure-free overhead = +4.5%)
#   resilient_once_mean      = 116.57s (mean(n=3))
#
# Cap calculation:
#   1.2 * vanilla   = 127.57s
#   1.1 * ref_once  = 128.23s
#   cap = max(...)  = 128.23s = 1.206x vanilla (basis: 1.1_x_reference_once)
#
# Source: build/validation_output/QMCPACK_reference/benchmarks/raw_metrics.json
# Re-derive: python3 /tmp/derive_per_app_caps.py
production_cap_ratio: 1.206

# Cold-replay detector input perturbation (2026-05-17). See
# docs/cold_replay_detector.md §5 + §8.
#
# Knob: Jastrow electron-electron correlation parameter `B` (the
# `<var id="jud_b" name="B">0.821683</var>` line in he_simple_opt.xml).
# QMCPACK uses this as the STARTING value for the linear-optimization
# loop; the variational optimizer minimizes the energy by tweaking B
# and (over 60 loop iterations) converges to a final variational
# wavefunction.  A different starting B converges to the same minimum
# but via a different trajectory -> the `reference energy` lines that
# the comparator reads differ by O(stochastic noise + optimizer
# trajectory).  Tolerance is 0.01 so even a small B shift produces a
# detectable energy diff.
#
# Range: 0.81 - 0.83 (+/-1.2% around the nominal 0.821683).  Why
# narrow:
#   - keeps B physically meaningful (positive, of order unity for the
#     He atom Pade Jastrow at the right cusp condition)
#   - sub-1.5% lets the optimizer still find the same minimum in 60
#     iterations (no convergence failure), so safety holds
#   - same blocks/steps/timestep/samples in both qmc blocks -> same
#     statistical sample count -> same wall time
#   - perturbing the *starting* value (not the converged value) means
#     the optimizer does effectively the same work; per-iter cost
#     ~constant -> timing invariant holds
#
# Calibration: pending. The calibrator must verify:
#   (a) |Z_P(0.81) - Z_P(0.83)| > 1000 * tolerance (1e-2) — note the
#       reference energy is around -2.9 Ha and stochastic noise is
#       ~5e-4, so this is the tightest of the three invariants to
#       verify
#   (b) elapsed times within 5% of unperturbed baseline (0.821683)
#   (c) no NaN/crash at either extreme (optimizer should converge
#       within the `loop max="60"` cap for any starting B in this range)
#
# Fallback candidates if calibration fails:
#   - `<radfunc exponent="2.0"/>` (Slater-orbital exponent for the He
#     atom), tight range 1.98-2.02 -- shifts the basis function which
#     affects every estimator
#   - `<parameter name="timestep"> 0.1 </parameter>` in the final VMC
#     block, range 0.099-0.101 (would need to perturb the right one of
#     two timestep occurrences)
#   - `<parameter name="alloweddifference"> 1.0e-5 </parameter>` would
#     shift convergence criterion -> changes optimizer iteration count
#     -> NOT timing-stable; skip
perturbation:
  method: regex_replace
  file: examples/molecules/He/he_simple_opt.xml
  pattern: '<var id="jud_b" name="B">[0-9.eE+-]+</var>'
  replacement_template: '<var id="jud_b" name="B">{value:.6f}</var>'
  value_range: [0.81, 0.83]
  calibration:
    # 2026-05-21: tightened from 1e-9 (v8 schema baseline) to 1e-3 to match
    # the v9 schema's trajectory_sum sensitivity. The B perturbation shifts
    # trajectory_sum (sum of LocalEnergy across all .scalar.dat blocks of
    # all series) by O(1.0) absolute — typical reference energy is ~-2.9 Ha
    # and the optimizer accumulates O(60 iters × 100 blocks) entries, so a
    # 1.2% B shift produces a sum delta orders of magnitude above 1e-3.
    expected_min_output_diff: 1.0e-3
    safe_value_range_verified: true
