name: QMCPACK
category: iterative_fixed
language: cpp
description: Quantum Monte Carlo simulation package
mpi_ranks: 1
build:
  system: cmake
  cmd: bash build_qmcpack.sh
executable: ../../../build/bin/qmcpack
input_subdir: examples/molecules/He
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
  - completed successfully
sizes:
  validation:
    description: "smallest workload \u2014 used for AUDIT (vanilla strip verification) + ITER + baseline cache"
    app_args:
    - he_simple_opt.xml
    nominal_runtime_s: null
  small:
    description: "first benchmark cycle \u2014 fast tier"
    app_args:
    - examples/molecules/He/he_simple_opt.xml
    nominal_runtime_s: null
  medium:
    description: "TODO: scaled-up workload (~3-5\xD7 small) for second benchmark cycle"
    app_args: null
    nominal_runtime_s: null
  large:
    description: "TODO: largest workload (~10\xD7 small) for third benchmark cycle"
    app_args: null
    nominal_runtime_s: null
frequencies:
  nofail:
    description: "no failures injected \u2014 error-free baseline timing"
    inject_failures: false
  once:
    description: single failure mid-run; recovery from one checkpoint
    inject_failures: true
    delay_fraction: 0.5
    failures_count_target: 1
  multi:
    description: "failures every nominal_runtime/4 \u2014 repeated recovery"
    inject_failures: true
    delay_fraction: 0.25
    failures_count_target: 3
  burst:
    description: "failures every nominal_runtime/7 \u2014 stress test"
    inject_failures: true
    delay_fraction: 0.143
    failures_count_target: 6
benchmark:
  num_runs_per_cell: 3
wallclock_cap_factor: 3.0
timeout_fallback_s: 120
