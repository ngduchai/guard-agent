name: AMReX
category: irregular_variable
language: cpp
description: "Block-structured adaptive mesh refinement framework"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -DUSE_MPI=TRUE .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./main3d.gnu.MPI.ex inputs"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: native
  config_file: null
