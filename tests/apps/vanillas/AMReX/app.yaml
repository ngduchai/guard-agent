name: AMReX
category: irregular_variable
language: cpp
description: "Block-structured adaptive mesh refinement framework"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DAMReX_MPI=ON -DAMReX_OMP=OFF -DAMReX_ENABLE_TESTS=ON -DCMAKE_BUILD_TYPE=Release && make -j2"
run:
  cmd: "./_build/Tests/CLZ/3d/Test_CLZ_3d"
  timeout: 120
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
  ignore_patterns:
    - "Initializing"
    - "initialized"
    - "MPI"
    - "Finalized"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DAMReX_MPI=ON -DAMReX_OMP=OFF -DAMReX_ENABLE_TESTS=ON -DCMAKE_BUILD_TYPE=Release && make -j2"
ckpt_run:
  cmd: "./_build/Tests/CLZ/3d/Test_CLZ_3d"
  timeout: 120
