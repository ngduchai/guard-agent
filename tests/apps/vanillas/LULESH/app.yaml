name: LULESH
category: iterative_fixed
language: cpp
description: "Lagrangian shock hydrodynamics proxy app (Sedov blast wave)"
mpi_ranks: 8
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake -DWITH_MPI=On -DWITH_OPENMP=Off -DCMAKE_BUILD_TYPE=Release .. && make"
run:
  cmd: "mpirun --oversubscribe -np {mpi_ranks} ./_build/lulesh2.0 -s 20 -i 500 -p"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  ignore_patterns:
    - "Elapsed time"
    - "Grind time"
checkpoint:
  library: scr
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake -DWITH_MPI=On -DWITH_OPENMP=Off -DCMAKE_BUILD_TYPE=Release .. && make"
ckpt_run:
  cmd: "mpirun --oversubscribe -np {mpi_ranks} ./_build/lulesh2.0 -s 20 -i 500 -p"
  timeout: 120
