name: AMR-Wind
category: irregular_variable
language: cpp
description: "Wind energy incompressible flow solver (AMReX-based)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "test -d submods/amrex || git clone --depth 1 https://github.com/AMReX-Codes/amrex.git submods/amrex; mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DAMR_WIND_ENABLE_MPI=ON && make -j$(nproc)"
run:
  cmd: "./_build/amr_wind/amr_wind input.i"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "STEP"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "test -d submods/amrex || git clone --depth 1 https://github.com/AMReX-Codes/amrex.git submods/amrex; mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DAMR_WIND_ENABLE_MPI=ON && make -j$(nproc)"
ckpt_run:
  cmd: "./_build/amr_wind/amr_wind input.i"
  restart_cmd: "bash run_with_restart.sh 1"
  timeout: 120
  kill_after: 5.0
