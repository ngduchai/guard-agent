name: Chameleon
category: task_fixed
language: cpp
description: "HPCG benchmark (replacement for Chameleon dense linear algebra)"
mpi_ranks: 4
build:
  system: make
  cmd: "mkdir -p build && cd build && ../configure MPI_GCC_OMP && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./build/bin/xhpcg --nx=16 --ny=16 --nz=16 --rt=1"
  timeout: 30
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
  ignore_patterns:
    - "time"
    - "Time"
    - "seconds"
    - "date"
    - "clock"
    - "version"
    - "HPCG"
    - "Benchmark"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "mkdir -p build && cd build && ../configure MPI_GCC_OMP && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./build/bin/xhpcg --nx=16 --ny=16 --nz=16 --rt=1"
  timeout: 30
