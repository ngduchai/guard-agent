name: Chameleon
category: task_fixed
language: c
description: "Dense linear algebra for heterogeneous architectures (StarPU/PaRSEC)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -DCHAMELEON_USE_MPI=ON .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./testing/testing_dpotrf -N 1000 -NB 200"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: starpu
  config_file: null
