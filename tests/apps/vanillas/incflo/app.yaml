name: incflo
category: pipeline_fixed
language: cpp
description: "Incompressible Navier-Stokes solver (AMReX-based)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "./_build/incflo3d.gnu.MPI.ex inputs"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "STEP"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
ckpt_run:
  cmd: "./_build/incflo3d.gnu.MPI.ex inputs"
  restart_cmd: "bash run_with_restart.sh 1"
  timeout: 120
  kill_after: 5.0
