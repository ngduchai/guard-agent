name: incflo
category: dynamic_variable
language: cpp
description: "Incompressible Navier-Stokes solver (AMReX-based)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "test -d amrex || git clone --depth 1 https://github.com/AMReX-Codes/amrex.git; test -d AMReX-Hydro || git clone --depth 1 https://github.com/AMReX-Fluids/AMReX-Hydro.git; mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DAMREX_HOME=$(pwd)/../amrex -DAMREX_HYDRO_HOME=$(pwd)/../AMReX-Hydro && make -j$(nproc)"
run:
  cmd: './_build/incflo.ex test_3d/inputs.poiseuille_annulus "amr.check_int=-1" "max_step=2000"'
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "AMReX"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "test -d amrex || git clone --depth 1 https://github.com/AMReX-Codes/amrex.git; test -d AMReX-Hydro || git clone --depth 1 https://github.com/AMReX-Fluids/AMReX-Hydro.git; mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DAMREX_HOME=$(pwd)/../amrex -DAMREX_HYDRO_HOME=$(pwd)/../AMReX-Hydro && make -j$(nproc)"
ckpt_run:
  cmd: './_build/incflo.ex test_3d/inputs.poiseuille_annulus "amr.check_int=200" "max_step=2000"'
  restart_cmd: 'CKPT=$(ls -td chk????? 2>/dev/null | head -1) && ./_build/incflo.ex test_3d/inputs.poiseuille_annulus "amr.check_int=200" "max_step=2000" "amr.restart=$CKPT"'
  timeout: 120
  kill_after: 5.0
