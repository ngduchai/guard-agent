name: SST
category: asynchronous
language: python
description: "Sandia Structural Simulation Toolkit — conservative parallel discrete-event simulator (sst-core + simpleElementExample 16-component ring)"
mpi_ranks: 4
build:
  system: shell
  cmd: "test -x ${SST_BIN:-$HOME/.local/sst/bin/sst} || { echo 'SST not installed at ${SST_BIN:-$HOME/.local/sst/bin/sst} — see tests/apps/docs/SST/README.md'; exit 1; }"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./run_sst.sh"
  timeout: 300
comparison:
  method: text
  output_file: null
  tolerance: 0.001
  keep_patterns:
    - "SST_VALIDATION="
