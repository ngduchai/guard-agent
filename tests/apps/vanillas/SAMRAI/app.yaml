name: SAMRAI
category: task_variable
language: cpp
description: "Structured AMR application infrastructure (LLNL)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/bin/linadv validation_inputs/linadv.2d.input"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
  keep_patterns:
    - "PASSED"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/bin/linadv validation_inputs/linadv.2d.input"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 300
  kill_after: 5.0
