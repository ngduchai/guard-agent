name: SAMRAI
category: irregular_variable
language: cpp
description: "Structured AMR application infrastructure (LLNL)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./_build/bin/kvtest"
  timeout: 120
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./_build/bin/kvtest"
  timeout: 120
