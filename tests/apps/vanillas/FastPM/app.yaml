name: FastPM
category: dynamic_fixed
language: c
description: "Fast Particle Mesh N-body solver (cosmological simulation)"
mpi_ranks: 4
build:
  system: make
  cmd: 'CPPFLAGS="-I$HOME/.local/include" LDFLAGS="-L$HOME/.local/lib -lgsl -lgslcblas -lm" make -j$(nproc)'
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./src/fastpm Examples/fastpm/standard.lua"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Done"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: 'CPPFLAGS="-I$HOME/.local/include" LDFLAGS="-L$HOME/.local/lib -lgsl -lgslcblas -lm" make -j$(nproc)'
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./src/fastpm Examples/fastpm/standard.lua"
  restart_cmd: "mpirun -np {mpi_ranks} --oversubscribe ./src/fastpm Examples/fastpm/standard.lua -r output/fastpm_1.0000"
  timeout: 120
  kill_after: 5.0
