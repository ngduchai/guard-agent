name: CLAMR
category: task_variable
language: cpp
description: "Cell-based adaptive mesh refinement mini-app (shallow water equations)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DGRAPHICS_TYPE=None -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./_build/clamr_mpionly -n 128 -t 100"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 10.0
  ignore_patterns:
    - "time"
    - "Time"
    - "cpu"
    - "CPU"
    - "mass"
    - "Mass"
    - "memory"
    - "Memory"
    - "Profiling"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DGRAPHICS_TYPE=None -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./_build/clamr_mpionly -n 128 -t 100"
  timeout: 120
