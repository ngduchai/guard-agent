name: CLAMR
category: iterative_adaptive
language: cpp
description: "Cell-based adaptive mesh refinement mini-app (shallow water equations)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DGRAPHICS_TYPE=None -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  # -n 768 mesh × -t 5000 timesteps.  -t 10000 hits a NaN around iter 7400
  # even at -n 512 (the CFL/numerical instability of the shallow-water blast
  # configuration kicks in past cycle ~7400 regardless of mesh).  Bigger
  # mesh (×9 cells over -n 256 vanilla baseline) brings warm runtime up to
  # ~110-120 s while staying safely below the NaN cycle.
  cmd: "mpirun -np {mpi_ranks} ./_build/clamr_mpionly -n 768 -t 5000"
  timeout: 360
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Iteration 5000"
