name: miniFE
category: iterative_fixed
language: cpp
description: "Sparse finite element proxy app (conjugate gradient solver)"
mpi_ranks: 4
build:
  system: make
  cmd: "make -f Makefile"
run:
  cmd: "mpirun -np {mpi_ranks} ./miniFE.x nx=50 ny=50 nz=50"
  timeout: 120
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: fti
  config_file: config.L1.fti
