name: miniFE
category: iterative_fixed
language: cpp
description: "Sparse finite element proxy app (conjugate gradient solver)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./src/miniFE.x nx=50 ny=50 nz=50"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
  ignore_patterns:
    - "time"
    - "Time"
    - "seconds"
    - "clock"
checkpoint:
  library: fti
  config_file: config.L1.fti
ckpt_build:
  system: make
  cmd: "cd src && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./src/miniFE.x nx=50 ny=50 nz=50"
  timeout: 120
