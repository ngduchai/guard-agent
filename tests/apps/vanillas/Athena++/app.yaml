name: Athena++
category: structured_adaptive
language: cpp
description: "Astrophysical MHD code with AMR (Princeton)"
mpi_ranks: 4
build:
  system: make
  cmd: "python3 configure.py --prob linear_wave -mpi && make clean && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./bin/athena -i inputs/hydro/athinput.linear_wave1d"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  ignore_patterns:
    - "time"
    - "Time"
    - "cpu"
    - "walltime"
    - "zone-cycles/cpu_second"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "python3 configure.py --prob linear_wave -mpi && make clean && make -j$(nproc)"
ckpt_run:
  cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
