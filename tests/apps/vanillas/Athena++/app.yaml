name: Athena++
category: dynamic_variable
language: cpp
description: "Astrophysical MHD code with AMR (Princeton)"
mpi_ranks: 1
build:
  system: make
  cmd: "python3 configure.py --prob blast -mpi && make clean && make -j$(nproc)"
run:
  cmd: "./bin/athena -i inputs/hydro/athinput.blast"
  kill_after: 5.0
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  ignore_patterns:
    - "time"
    - "Time"
    - "cpu"
    - "walltime"
    - "zone-cycles"
    - "MeshBlock"
    - "cycle"
    - "created"
    - "Restarting"
    - "checkpoint"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "python3 configure.py --prob blast -mpi && make clean && make -j$(nproc)"
ckpt_run:
  cmd: "bash run_with_restart.sh 1"
  restart_cmd: "bash run_with_restart.sh 1"
  timeout: 120
  kill_after: 5.0
