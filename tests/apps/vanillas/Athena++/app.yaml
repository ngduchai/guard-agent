name: Athena++
category: iterative_adaptive
language: cpp
description: "Astrophysical MHD code with AMR (Princeton)"
mpi_ranks: 4
build:
  system: make
  cmd: "python3 configure.py --prob blast -mpi && make clean && make -j$(nproc)"
run:
  cmd: "./bin/athena -i inputs/hydro/athinput.blast"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  ignore_patterns:
    - "time"
    - "Time"
    - "cpu"
    - "walltime"
    - "zone-cycles"
    - "MeshBlock"
    - "cycle"
    - "created"
