name: CoMD
category: iterative_fixed
language: c
description: "Classical molecular dynamics proxy app (Lennard-Jones / EAM potentials)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src-mpi && cp Makefile.vanilla Makefile && make"
run:
  cmd: "mpirun -np {mpi_ranks} ./bin/CoMD-mpi -x 10 -y 10 -z 10 -N 10000 -n 10000 -i 2 -j 2 -k 1"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
    - "Final energy"
    - "eFinal"
    - "Final atom count"
checkpoint:
  library: posix
  config_file: null
ckpt_build:
  system: make
  cmd: "cd src-mpi && cp Makefile.vanilla Makefile && make"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./bin/CoMD-mpi -x 10 -y 10 -z 10 -N 10000 -n 10000 -i 2 -j 2 -k 1"
  timeout: 120
