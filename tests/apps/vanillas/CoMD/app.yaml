name: CoMD
category: iterative_fixed
language: c
description: "Classical molecular dynamics proxy app (Lennard-Jones / EAM potentials)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src-mpi && cp Makefile.vanilla Makefile && make"
run:
  cmd: "mpirun -np {mpi_ranks} ./bin/CoMD-mpi -x 70 -y 70 -z 18 -N 1500 -n 100 -i 2 -j 2 -k 1"
  timeout: 360
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
    - "Final energy"
    - "eFinal"
    - "Final atom count"
