name: CoMD
category: iterative_fixed
language: c
description: "Classical molecular dynamics proxy app (Lennard-Jones / EAM potentials)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src-mpi && cp Makefile.vanilla Makefile && make"
run:
  cmd: "mpirun -np {mpi_ranks} ./bin/CoMD-mpi -x 10 -y 10 -z 10 -n 100 -i 2 -j 2 -k 1"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 5.0
  ignore_patterns:
    - "2026"
    - "Timings for Rank"
    - "Timing Statistics"
    - "Timer Name"
    - "loop"
    - "timestep"
    - "position"
    - "velocity"
    - "redistribute"
    - "atomHalo"
    - "total"
    - "force"
    - "commHalo"
    - "commReduce"
    - "Average"
    - "_____"
    - "Performance"
    - "atom update rate"
    - "atoms/us"
    - "us/atom"
    - "VeloC"
    - "checkpoint"
checkpoint:
  library: posix
  config_file: null
ckpt_build:
  system: make
  cmd: "cd src-mpi && cp Makefile.vanilla Makefile && make"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./bin/CoMD-mpi -x 10 -y 10 -z 10 -n 100 -i 2 -j 2 -k 1"
  timeout: 120
