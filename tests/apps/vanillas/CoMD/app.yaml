name: CoMD
category: iterative_fixed
language: c
description: "Classical molecular dynamics proxy app (Lennard-Jones / EAM potentials)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src-mpi && cp Makefile.vanilla Makefile && make"
run:
  cmd: "mpirun -np {mpi_ranks} ./src-mpi/CoMD-mpi -x 10 -y 10 -z 10 -n 100"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: posix
  config_file: null
