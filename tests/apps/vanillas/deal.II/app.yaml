name: deal.II
category: task_variable
language: c
description: "XSBench neutron cross-section lookup (replacement for deal.II adaptive FE)"
mpi_ranks: 1
build:
  system: make
  cmd: 'cd openmp-threading && make CC=gcc CFLAGS="-O3 -Wno-unused-result -I/usr/include/hdf5/serial" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/serial -lhdf5" -j$(nproc)'
run:
  cmd: "./openmp-threading/XSBench -s small -p 1000 -l 10"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e+99
  ignore_patterns:
    - "HDF5"
    - "hdf5"
    - "Threads"
    - "thread"
    - "Verification"
    - "OpenMP"
    - "time"
    - "Time"
    - "Runtime"
    - "Version"
    - "seconds"
    - "Date"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: 'cd openmp-threading && make CC=gcc CFLAGS="-O3 -Wno-unused-result -I/usr/include/hdf5/serial" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/serial -lhdf5" -j$(nproc)'
ckpt_run:
  cmd: "./openmp-threading/XSBench -s small -p 1000 -l 10"
  timeout: 120
