name: miniVite
category: irregular_fixed
language: cpp
description: "Graph community detection proxy app (Louvain method, first phase)"
mpi_ranks: 4
build:
  system: make
  cmd: "make"
run:
  cmd: "mpirun -np {mpi_ranks} ./miniVite -n 500000"
  timeout: 120
comparison:
  method: text
  output_file: stdout.txt
  tolerance: 1.0e-6
  ignore_patterns:
    - "time"
    - "Time"
    - "WRITE"
    - "seconds"
    - "Modularity"
    - "MODS"
    - "TIMESTAMP"
    - "FTI"
    - "daemon"
    - "Reading"
    - "Selected"
    - "execution"
    - "Checkpoint"
    - "checkpoint"
    - "rank"
    - "Rank"
    - "node"
    - "Process"
    - "generate"
    - "Average"
    - "datatype"
    - "Normal"
    - "Iteration"
    - "edge_list"
    - "Number"
    - "Maximum"
    - "Variance"
    - "Standard"
    - "Expected"
    - "VeloC"
    - "veloc"
    - "Restarted"
checkpoint:
  library: veloc
  config_file: veloc.cfg
ckpt_build:
  system: make
  cmd: "make"
ckpt_run:
  cmd: "LD_LIBRARY_PATH=$HOME/.local/lib:$LD_LIBRARY_PATH mpirun -np {mpi_ranks} ./miniVite config.L1.fti -n 500000"
  timeout: 300
