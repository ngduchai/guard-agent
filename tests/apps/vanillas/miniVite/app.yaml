name: miniVite
category: dynamic_fixed
language: cpp
description: "Graph community detection proxy app (Louvain method, first phase)"
mpi_ranks: 4
build:
  system: make
  cmd: "make"
run:
  cmd: "mpirun -np {mpi_ranks} ./miniVite -n 500000"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "Modularity"
  ignore_patterns:
  ignore_patterns:
    - "time"
    - "Time"
    - "WRITE"
    - "seconds"
    - "Modularity"
    - "MODS"
    - "TIMESTAMP"
    - "FTI"
    - "daemon"
    - "Reading"
    - "Selected"
    - "execution"
    - "Checkpoint"
    - "checkpoint"
    - "rank"
    - "Rank"
    - "node"
    - "Process"
    - "generate"
    - "Average"
    - "datatype"
    - "Normal"
    - "Iteration"
    - "edge_list"
    - "Number"
    - "Maximum"
    - "Variance"
    - "Standard"
    - "Expected"
    - "VeloC"
    - "veloc"
    - "Restarted"
checkpoint:
  library: veloc
  config_file: veloc.cfg
ckpt_build:
  system: make
  cmd: "make"
ckpt_run:
  cmd: "LD_LIBRARY_PATH=$HOME/.local/lib:$LD_LIBRARY_PATH mpirun -np {mpi_ranks} ./miniVite config.L1.fti -n 500000"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 300
  kill_after: 5.0
