name: miniVite
category: dynamic_fixed
language: cpp
description: "Graph community detection proxy app (Louvain method)"
mpi_ranks: 4
build:
  system: make
  cmd: "make"
run:
  cmd: "mpirun -np {mpi_ranks} ./miniVite -n 500000"
  timeout: 300
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "Modularity"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "make"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./miniVite -n 500000"
  timeout: 300
  kill_after: 5.0
