name: QMCPACK
category: iterative_fixed
language: cpp
description: "Quantum Monte Carlo simulation package"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DQMC_MPI=ON && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/bin/qmcpack simple.xml"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "QMC"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DQMC_MPI=ON && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/bin/qmcpack simple.xml"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
