name: QMCPACK
category: dynamic_fixed
language: cpp
description: "Quantum Monte Carlo simulation package"
mpi_ranks: 1
build:
  system: cmake
  cmd: "bash build_qmcpack.sh"
run:
  cmd: "cd examples/molecules/He && ../../../build/bin/qmcpack he_simple_opt.xml"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "completed successfully"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "bash build_qmcpack.sh"
ckpt_run:
  cmd: "cd examples/molecules/He && ../../../build/bin/qmcpack he_simple_opt_ckpt.xml"
  restart_cmd: "bash run_with_restart.sh"
  timeout: 120
  kill_after: 5.0
