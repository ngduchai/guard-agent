name: AMG
category: irregular_fixed
language: c
description: "Algebraic multigrid solver proxy app"
mpi_ranks: 4
build:
  system: make
  cmd: "make"
run:
  cmd: "mpirun -np {mpi_ranks} ./test/amg -problem 1 -n 50 50 50"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 10.0
  ignore_patterns:
    - "Wall clock"
    - "wall clock"
    - "Setup phase"
    - "Solve phase"
checkpoint:
  library: fti
  config_file: null
ckpt_build:
  system: make
  cmd: "make"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./test/amg -problem 1 -n 50 50 50"
  timeout: 120
