name: SW4lite
category: structured_fixed
language: cpp
description: "Seismic wave propagation mini-app (LLNL) - 4th order finite difference"
mpi_ranks: 4
build:
  system: make
  cmd: "make -j$(nproc) EXTRA_LINK_FLAGS='-lgfortran -L$HOME/.local/lib -lblas -llapack'"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./optimize/sw4lite tests/pointsource/pointsource.in"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  ignore_patterns:
    - "time"
    - "Time"
    - "cpu"
    - "seconds"
    - "Elapsed"
    - "Execution"
    - "Wall"
    - "clock"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "make -j$(nproc) EXTRA_LINK_FLAGS='-lgfortran -L$HOME/.local/lib -lblas -llapack'"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./optimize/sw4lite tests/pointsource/pointsource.in"
  timeout: 120
