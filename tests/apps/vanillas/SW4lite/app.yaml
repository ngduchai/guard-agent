name: SW4lite
category: structured_fixed
language: cpp
description: "Seismic wave propagation mini-app (LLNL) - 4th order finite difference"
mpi_ranks: 4
build:
  system: make
  cmd: 'make -j$(nproc) "EXTRA_LINK_FLAGS=-lgfortran -L$HOME/.local/lib -lblas -llapack"'
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./optimize/sw4lite tests/validation_test.in"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Errors at time"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: 'make -j$(nproc) "EXTRA_LINK_FLAGS=-lgfortran -L$HOME/.local/lib -lblas -llapack"'
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./optimize/sw4lite tests/validation_test.in"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
