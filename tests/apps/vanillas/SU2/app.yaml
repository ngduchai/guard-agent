name: SU2
category: pipeline_fixed
language: cpp
description: "CFD and aerodynamic shape optimization"
mpi_ranks: 1
build:
  system: meson
  cmd: "touch su2preconfig.timestamp && PATH=$HOME/.local/bin:$PATH meson setup _build -Dwith-mpi=enabled && cd _build && ninja -j$(nproc)"
run:
  cmd: "./_build/SU2_CFD/src/SU2_CFD --help"
  timeout: 30
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-6
  ignore_patterns:
    - "time"
    - "Time"
    - "version"
    - "Version"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: meson
  cmd: "touch su2preconfig.timestamp && PATH=$HOME/.local/bin:$PATH meson setup _build -Dwith-mpi=enabled && cd _build && ninja -j$(nproc)"
ckpt_run:
  cmd: "./_build/SU2_CFD/src/SU2_CFD --help"
  timeout: 30
