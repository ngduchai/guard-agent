name: SU2
category: pipeline_fixed
language: cpp
description: "CFD and aerodynamic shape optimization"
mpi_ranks: 4
build:
  system: meson
  cmd: "meson build && cd build && ninja"
run:
  cmd: "mpirun -np {mpi_ranks} ./build/SU2_CFD config.cfg"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
