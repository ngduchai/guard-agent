name: GOMC
category: dynamic_fixed
language: cpp
description: "GPU Optimized Monte Carlo molecular simulation (NVT/NPT ensembles)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "./build/GOMC_CPU_NVT +p1 Examples/NVT/in.conf"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "completed"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
ckpt_run:
  cmd: "./build/GOMC_CPU_NVT +p1 Examples/NVT/in.conf"
  timeout: 120
  kill_after: 5.0
