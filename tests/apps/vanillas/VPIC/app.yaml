name: VPIC
category: particle_fixed
language: cpp
description: "Vector Particle-In-Cell plasma simulation (LANL)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && cd .. && build/bin/vpic sample/harris"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./harris.Linux"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "Energy"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && cd .. && build/bin/vpic sample/harris"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./harris.Linux"
  restart_cmd: "CKPT=$(ls checkpt.*.0 2>/dev/null | sort -t. -k2 -n | tail -1 | sed 's/\\.[0-9]*$//') && mpirun -np {mpi_ranks} --oversubscribe ./harris.Linux --restore $CKPT"
  timeout: 120
  kill_after: 5.0
