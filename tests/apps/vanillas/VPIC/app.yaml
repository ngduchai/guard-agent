name: VPIC
category: particle_fixed
language: cpp
description: "Vector Particle-In-Cell plasma simulation (LANL)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./build/bin/vpic"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./build/bin/vpic"
  timeout: 120
