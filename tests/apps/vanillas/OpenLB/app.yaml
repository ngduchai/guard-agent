name: OpenLB
category: iterative_fixed
language: cpp
description: "Lattice Boltzmann CFD framework (bstep2d example)"
mpi_ranks: 4
build:
  system: make
  cmd: "cp config.git.mk config.mk && sed -i 's/CXX.*:= g++/CXX := mpicxx/' config.mk && sed -i 's/CC.*:= gcc/CC := mpicc/' config.mk && sed -i 's/PARALLEL_MODE.*:= OFF/PARALLEL_MODE := MPI/' config.mk && make -j$(nproc) && cd examples/laminar/bstep2d && make -j$(nproc)"
run:
  # --MAX_PHYS_T 21 overrides the source default of 2.0; ~5.6 s per phys-time
  # unit at 4 ranks → ~118 s baseline (~120 s target).
  cmd: "cd examples/laminar/bstep2d && mpirun -np {mpi_ranks} --oversubscribe ./bstep2d --MAX_PHYS_T 21"
  timeout: 360
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "LatticeStatistics] step="
