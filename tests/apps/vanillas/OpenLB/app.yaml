name: OpenLB
category: pipeline_fixed
language: cpp
description: "Lattice Boltzmann CFD framework (bstep2d example)"
mpi_ranks: 4
build:
  system: make
  cmd: "cp config.git.mk config.mk && sed -i 's/CXX.*:= g++/CXX := mpicxx/' config.mk && sed -i 's/CC.*:= gcc/CC := mpicc/' config.mk && sed -i 's/PARALLEL_MODE.*:= OFF/PARALLEL_MODE := MPI/' config.mk && make -j$(nproc) && cd examples/laminar/bstep2d && make -j$(nproc)"
run:
  cmd: "cd examples/laminar/bstep2d && mpirun -np {mpi_ranks} --oversubscribe ./bstep2d"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "LatticeStatistics] step=64100"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cp config.git.mk config.mk && sed -i 's/CXX.*:= g++/CXX := mpicxx/' config.mk && sed -i 's/CC.*:= gcc/CC := mpicc/' config.mk && sed -i 's/PARALLEL_MODE.*:= OFF/PARALLEL_MODE := MPI/' config.mk && make -j$(nproc) && cd examples/laminar/bstep2d && make -j$(nproc)"
ckpt_run:
  cmd: "cd examples/laminar/bstep2d && mpirun -np {mpi_ranks} --oversubscribe ./bstep2d"
  timeout: 300
