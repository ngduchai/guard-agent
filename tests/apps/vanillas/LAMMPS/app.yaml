name: LAMMPS
category: iterative_variable
language: cpp
description: "Large-scale molecular dynamics simulator"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -S cmake -B _build -DBUILD_MPI=yes -DCMAKE_BUILD_TYPE=Release && cmake --build _build -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./_build/lmp -in bench/in.lj_long"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
    - "      2000"
  ignore_patterns:
    - "LAMMPS"
    - "OMP_NUM_THREADS"
    - "using"
    - "Lattice"
    - "Created"
    - "create_atoms"
    - "Generated"
    - "Neighbor"
    - "update:"
    - "max neigh"
    - "ghost"
    - "binsize"
    - "neighbor list"
    - "pair"
    - "attributes"
    - "stencil"
    - "bin:"
    - "Setting up"
    - "Unit style"
    - "Current step"
    - "Time step"
    - "Per MPI"
    - "Step"
    - "Loop time"
    - "Performance"
    - "Nlocal"
    - "Histogram"
    - "Total wall"
    - "Dangerous"
    - "Last active"
    - "WARNING"
    - "MPI task"
    - "CPU"
    - "memory"
    - "master"
    - "orthogonal"
    - "processor"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "cmake -S cmake -B _build -DBUILD_MPI=yes -DCMAKE_BUILD_TYPE=Release && cmake --build _build -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./_build/lmp -in bench/in.lj_ckpt"
  restart_cmd: "bash bench/run_with_restart.sh {mpi_ranks}"
  timeout: 300
  kill_after: 5.0
