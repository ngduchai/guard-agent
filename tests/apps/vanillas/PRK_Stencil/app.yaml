name: PRK_Stencil
category: asynchronous
language: c
description: "Parallel Research Kernels MPI1 Stencil — barrier-free 2D star-shaped stencil with non-blocking halo (no in-loop MPI_Allreduce/Barrier)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd Stencil && make stencil"
run:
  cmd: "cd Stencil && mpirun -np {mpi_ranks} --oversubscribe ./stencil 16500 4000"
  timeout: 360
comparison:
  method: numeric
  output_file: null
  tolerance: 0.001
  keep_patterns:
    - "Solution validates"
    - "Reference L1 norm"
