name: ExaML
category: pipeline_variable
language: c
description: "XSBench neutron cross-section lookup (replacement for ExaML phylogenetics)"
mpi_ranks: 1
build:
  system: make
  cmd: "cd openmp-threading && make CC=gcc -j$(nproc)"
run:
  cmd: "./openmp-threading/XSBench -s small -p 1000 -l 10"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e+99
  ignore_patterns:
    - "HDF5"
    - "hdf5"
    - "Threads"
    - "thread"
    - "Verification"
    - "OpenMP"
    - "time"
    - "Time"
    - "Runtime"
    - "Version"
    - "seconds"
    - "Date"
    - "VeloC"
    - "veloc"
    - "Checkpoint"
    - "checkpoint"
    - "Restart"
    - "Lookups/s"
checkpoint:
  library: veloc
  config_file: "openmp-threading/veloc.cfg"
ckpt_build:
  system: cmake
  cmd: "cmake -S . -B build && cmake --build build -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np 4 ./build/XSBench -s small -p 1000 -l 10"
  timeout: 120
