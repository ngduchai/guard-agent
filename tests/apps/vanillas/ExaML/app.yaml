name: ExaML
category: pipeline_variable
language: c
description: "XSBench neutron cross-section lookup (replacement for ExaML phylogenetics)"
mpi_ranks: 1
build:
  system: make
  cmd: "cd openmp-threading && make CC=gcc -j$(nproc)"
run:
  cmd: "./openmp-threading/XSBench -s small -p 1000 -l 10"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 100.0
  ignore_patterns:
    - "time"
    - "Time"
    - "Runtime"
    - "Version"
    - "seconds"
    - "Date"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cd openmp-threading && make CC=gcc -j$(nproc)"
ckpt_run:
  cmd: "./openmp-threading/XSBench -s small -p 1000 -l 10"
  timeout: 120
