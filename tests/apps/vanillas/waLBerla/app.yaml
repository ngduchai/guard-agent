name: waLBerla
category: structured_fixed
language: cpp
description: "Lattice Boltzmann + multigrid framework with checkpoint"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DWALBERLA_BUILD_WITH_MPI=ON && make -j$(nproc) 01_BasicLBM"
run:
  cmd: "cp apps/tutorials/lbm/01_BasicLBM.prm _build/ 2>/dev/null; cp apps/tutorials/lbm/waLBerla.png _build/ 2>/dev/null; cd _build && ./apps/tutorials/lbm/01_BasicLBM 01_BasicLBM.prm"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "END LOGGING"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DWALBERLA_BUILD_WITH_MPI=ON && make -j$(nproc) 01_BasicLBM"
ckpt_run:
  cmd: "cp apps/tutorials/lbm/01_BasicLBM.prm _build/ 2>/dev/null; cp apps/tutorials/lbm/waLBerla.png _build/ 2>/dev/null; cd _build && ./apps/tutorials/lbm/01_BasicLBM 01_BasicLBM.prm"
  timeout: 120
  kill_after: 5.0
