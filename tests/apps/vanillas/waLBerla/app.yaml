name: waLBerla
category: structured_fixed
language: cpp
description: "Lattice Boltzmann + multigrid framework with checkpoint"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DWALBERLA_BUILD_WITH_MPI=ON && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/apps/benchmarks/UniformGrid/UniformGrid"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "MLUPS"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DWALBERLA_BUILD_WITH_MPI=ON && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/apps/benchmarks/UniformGrid/UniformGrid"
  timeout: 120
  kill_after: 5.0
