name: SPPARKS
category: task_fixed
language: cpp
description: "Stochastic Parallel PARticle Kinetic Simulator (KMC on lattice)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src && make mpi && cp spk_mpi .."
run:
  cmd: "cd examples/ising && mpirun -np {mpi_ranks} --oversubscribe ../../spk_mpi -in in.validation"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  keep_patterns:
    - "Loop time"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cd src && make mpi && cp spk_mpi .."
ckpt_run:
  cmd: "cd examples/ising && mpirun -np {mpi_ranks} --oversubscribe ../../spk_mpi -in in.validation"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
