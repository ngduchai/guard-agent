name: HyPar
category: task_fixed
language: cpp
description: "Finite-difference PDE solver (hyperbolic-parabolic PDEs)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_MPI=ON && make -j$(nproc)"
run:
  cmd: "cd Examples/1D/FPDoubleWell && mpirun -np {mpi_ranks} --oversubscribe ../../../build/src/HyPar"
  timeout: 120
  kill_after: 3.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Finished"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_MPI=ON && make -j$(nproc)"
ckpt_run:
  cmd: "cd Examples/1D/FPDoubleWell && mpirun -np {mpi_ranks} --oversubscribe ../../../build/src/HyPar"
  timeout: 120
  kill_after: 3.0
