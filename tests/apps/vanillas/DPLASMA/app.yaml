name: DPLASMA
category: task_fixed
language: c
description: "Dense parallel linear algebra on PaRSEC task-based runtime"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./testing_dpotrf -N 1000 -NB 200"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-6
checkpoint:
  library: abft
  config_file: null
