name: DPLASMA
category: task_fixed
language: cpp
description: "HPCCG conjugate gradient benchmark (replacement for DPLASMA parallel linear algebra)"
mpi_ranks: 4
build:
  system: make
  cmd: "make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./test_HPCCG 20 20 20"
  timeout: 30
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e+55
  ignore_patterns:
    - "time"
    - "Time"
    - "seconds"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./test_HPCCG 20 20 20"
  timeout: 30
