name: Nyx
category: iterative_variable
language: cpp
description: "Adaptive mesh cosmological N-body hydrodynamics (AMReX-based)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -S . -B build -DAMReX_GPU_BACKEND=NONE && cmake --build build -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./build/Nyx3d.gnu.MPI.ex inputs"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
