name: Nyx
category: pipeline_variable
language: cpp
description: "AMReX cosmological hydrodynamics/N-body code"
mpi_ranks: 1
build:
  system: cmake
  cmd: "git init 2>/dev/null; mkdir -p _build && cd _build && cmake .. -DNyx_MPI=ON -DNyx_OMP=OFF -DNyx_HYDRO=YES -DNyx_HEATCOOL=NO -DNyx_SINGLE_PRECISION_PARTICLES=NO -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "./_build/Exec/HydroTests/nyx_HydroTests Exec/HydroTests/inputs.validation"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "TIME = 0\\.2 "
