name: Nyx
category: iterative_variable
language: cpp
description: "Cosmological N-body + hydrodynamics (AMReX-based)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "git submodule update --init external/amrex 2>/dev/null; mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DNyx_MPI=ON && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/Nyx3d.gnu.MPI.ex Exec/HydroTests/inputs"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "STEP"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "git submodule update --init external/amrex 2>/dev/null; mkdir -p _build && cd _build && cmake .. -DCMAKE_BUILD_TYPE=Release -DNyx_MPI=ON && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./_build/Nyx3d.gnu.MPI.ex Exec/HydroTests/inputs"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
