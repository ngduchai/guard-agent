name: RAxML-NG
category: pipeline_variable
language: cpp
description: "Maximum-likelihood phylogenetic tree inference"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./raxml-ng-mpi --msa input.fasta --model GTR+G --tree rand{1}"
  timeout: 300
comparison:
  method: text
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
