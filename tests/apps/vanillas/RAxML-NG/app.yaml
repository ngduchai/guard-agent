name: RAxML-NG
category: pipeline_variable
language: cpp
description: "PENNANT unstructured mesh physics (replacement for RAxML-NG phylogenetics)"
mpi_ranks: 4
build:
  system: make
  cmd: "make MPICXX=mpicxx -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./build/pennant test/sedovsmall/sedovsmall.pnt"
  timeout: 30
comparison:
  method: numeric
  output_file: test/sedovsmall/sedovsmall.xy
  tolerance: 1.0
  ignore_patterns:
    - "time"
    - "Time"
    - "cycle"
    - "End"
    - "Run"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "make MPICXX=mpicxx -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./build/pennant test/sedovsmall/sedovsmall.pnt"
  timeout: 30
