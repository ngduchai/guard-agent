name: Nektar++
category: pipeline_fixed
language: c
description: "miniAMR block-structured AMR proxy (replacement for Nektar++ spectral element)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd ref && make CC=mpicc -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./ref/miniAMR.x --num_refine 2 --max_blocks 500 --init_x 1 --init_y 1 --init_z 1 --npx 2 --npy 2 --npz 1 --nx 8 --ny 8 --nz 8 --num_objects 0 --num_tsteps 20"
  timeout: 30
comparison:
  method: text
  output_file: stdout.txt
  tolerance: 2000.0
  ignore_patterns:
    - "time"
    - "Time"
    - "elapsed"
    - "timer"
    - "VeloC"
    - "veloc"
    - "checkpoint"
    - "restored"
    - "resuming"
    - "GFLOPS"
    - "gflops"
    - "floating point"
    - "Adds:"
    - "Muls:"
    - "Divides:"
    - "Total blocks"
    - "Blocks/"
    - "blocks split"
    - "blocks reformed"
    - "blocks moved"
    - "moved "
    - "Max blocks"
    - "parents ave"
    - "max dots"
    - "ave dots"
    - "Summary:"
    - "malloc"
    - "Malloc"
    - "malloced"
    - "Number of refinement"
    - "Number of load"
    - "Number of redistrib"
    - "Number of plot"
    - "stddev"
    - "average"
    - "Per processor:"
    - "Total "
    - "Post IRecv"
    - "Pack faces"
    - "Send messages"
    - "Exchange "
    - "Apply BC"
    - "Wait "
    - "Unpack faces"
    - "Comm partners"
    - "Messages "
    - "Bytes "
    - "Faces "
    - "Sum of min"
    - "number of times"
    - "total sets"
    - "max number"
    - "total number"
    - "red :"
    - "calc:"
    - "compare objects"
    - "mark refine"
    - "communicate block"
    - "split blocks"
    - "sync"
    - "choose blocks"
    - "sort "
    - "dots back"
    - "pack blocks"
    - "move blocks"
    - "unpack blocks"
    - "misc"
    - "coarsen"
    - "load balance"
    - "redistribute"
    - "groups"
    - "initial refine"
    - "Number of blocks at"
    - "before ave"
    - "after ave"
    - "max sets"
    - "comm partners"
    - "Timestep "
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cd ref && make CC=mpicc -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./ref/miniAMR.x --num_refine 2 --max_blocks 500 --init_x 1 --init_y 1 --init_z 1 --npx 2 --npy 2 --npz 1 --nx 8 --ny 8 --nz 8 --num_objects 0 --num_tsteps 20"
  timeout: 30
