name: Nektar++
category: pipeline_fixed
language: cpp
description: "Spectral/hp element framework for PDEs"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -DNEKTAR_USE_MPI=ON .. && make -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./IncNavierStokesSolver session.xml"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
