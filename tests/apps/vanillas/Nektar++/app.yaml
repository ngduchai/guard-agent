name: Nektar++
category: pipeline_fixed
language: c
description: "miniAMR block-structured AMR proxy (replacement for Nektar++ spectral element)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd ref && make CC=mpicc -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} ./ref/miniAMR.x --num_refine 2 --max_blocks 500 --init_x 1 --init_y 1 --init_z 1 --npx 2 --npy 2 --npz 1 --nx 8 --ny 8 --nz 8 --num_objects 0 --num_tsteps 20"
  timeout: 30
comparison:
  method: numeric
  output_file: null
  tolerance: 2000.0
  ignore_patterns:
    - "time"
    - "Time"
    - "elapsed"
    - "timer"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cd ref && make CC=mpicc -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./ref/miniAMR.x --num_refine 2 --max_blocks 500 --init_x 1 --init_y 1 --init_z 1 --npx 2 --npy 2 --npz 1 --nx 8 --ny 8 --nz 8 --num_objects 0 --num_tsteps 20"
  timeout: 30
