name: GRChombo
category: irregular_variable
language: cpp
description: "Numerical relativity with octree AMR (Chombo-based)"
mpi_ranks: 4
build:
  system: make
  cmd: "make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./Main_BinaryBH3d.Linux.64.mpicxx.MPI.ex params.txt"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "PASS"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./Main_BinaryBH3d.Linux.64.mpicxx.MPI.ex params.txt"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
