name: MMSP
category: iterative_fixed
language: cpp
description: "Mesoscale Microstructure Simulation (Cahn-Hilliard phase-field)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd examples/phase_transitions/cahn-hilliard/convex_splitting && make parallel && (test -f test.dat || mpirun -np 1 --oversubscribe ./parallel --example 2 test.dat)"
run:
  # `9000 900` — 9× timesteps over the upstream default, 9× output
  # frequency keeps the same number of progress lines, targets ~120 s
  # baseline so LLM checkpoint cadence has room to fire before the 95%
  # injection delay.
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./mmsp_run.sh test.dat 9000 900"
  timeout: 360
comparison:
  method: numeric
  output_file: null
  tolerance: 1000.0
  keep_patterns:
    - "0h: 0m:"
  # Strip the embedded wall-clock timestamp (`Thu Apr 23 08:41:52 2026`).
  # MMSP only prints progress to stdout — the actual physics state is in
  # test.NNNN.dat files — so once the calendar fields are gone the only
  # remaining numbers are iteration index + per-iteration elapsed seconds,
  # which is what the high tolerance is meant to cover.  Without this,
  # baseline lines that happen to land on second 0 cause divide-by-near-zero
  # blowups (e.g. baseline 08:42:00 vs resilient 08:42:18 → 1.8e11).
  strip_patterns:
    - "[A-Z][a-z]{2} [A-Z][a-z]{2} +[0-9]+ [0-9:]+ [0-9]{4}"
