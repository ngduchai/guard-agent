name: MMSP
category: iterative_fixed
language: cpp
description: "Mesoscale Microstructure Simulation (Cahn-Hilliard phase-field)"
mpi_ranks: 4
build:
  system: make
  cmd: "cd examples/phase_transitions/cahn-hilliard/convex_splitting && make parallel"
run:
  cmd: "cd examples/phase_transitions/cahn-hilliard/convex_splitting && mpirun -np {mpi_ranks} --oversubscribe ./parallel --example 2 test.dat && mpirun -np {mpi_ranks} --oversubscribe ./parallel test.dat 1000 100"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 1000.0
  keep_patterns:
    - "0h: 0m:"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cd examples/phase_transitions/cahn-hilliard/convex_splitting && make parallel"
ckpt_run:
  cmd: "cd examples/phase_transitions/cahn-hilliard/convex_splitting && mpirun -np {mpi_ranks} --oversubscribe ./parallel --example 2 test.dat && mpirun -np {mpi_ranks} --oversubscribe ./parallel test.dat 1000 100"
  restart_cmd: "cd examples/phase_transitions/cahn-hilliard/convex_splitting && CKPT=$(ls -t test.*.dat 2>/dev/null | head -1) && mpirun -np {mpi_ranks} --oversubscribe ./parallel $CKPT 1000 100"
  timeout: 120
  kill_after: 5.0
