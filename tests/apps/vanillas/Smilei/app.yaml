name: Smilei
category: particle_fixed
language: cpp
description: "Particle-in-Cell plasma physics code with HDF5 checkpoint"
mpi_ranks: 4
build:
  system: make
  cmd: "make -j$(nproc) config=verbose"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./smilei namelist.py"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Time"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "make -j$(nproc) config=verbose"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./smilei namelist.py"
  restart_cmd: "mpirun -np {mpi_ranks} --oversubscribe ./smilei namelist.py restart000"
  timeout: 120
  kill_after: 5.0
