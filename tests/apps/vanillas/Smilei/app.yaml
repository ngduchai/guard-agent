name: Smilei
category: iterative_variable
language: cpp
mpi_ranks: 4
build:
  system: make
  cmd: 'CXXFLAGS="-I/usr/include/hdf5/openmpi -I/usr/include/python3.12" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/openmpi -lhdf5 -lpython3.12" make -j$(nproc) config=verbose'
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./smilei namelist_minimal.py"
  timeout: 300
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "END"
