name: Smilei
category: iterative_variable
language: cpp
description: "Particle-in-Cell plasma physics code with HDF5 checkpoint"
mpi_ranks: 4
build:
  system: make
  cmd: 'CXXFLAGS="-I/usr/include/hdf5/openmpi -I/usr/include/python3.12" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/openmpi -lhdf5 -lpython3.12" make -j$(nproc) config=verbose'
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./smilei namelist_minimal.py"
  timeout: 300
  kill_after: 8.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "END"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: 'CXXFLAGS="-I/usr/include/hdf5/openmpi -I/usr/include/python3.12" LDFLAGS="-L/usr/lib/aarch64-linux-gnu/hdf5/openmpi -lhdf5 -lpython3.12" make -j$(nproc) config=verbose'
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./smilei namelist_minimal.py"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 300
  kill_after: 8.0
