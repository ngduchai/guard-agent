name: NekRS
category: pipeline_fixed
language: cpp
description: "GPU-accelerated spectral element CFD solver"
mpi_ranks: 4
build:
  system: cmake
  cmd: "CC=mpicc CXX=mpicxx FC=mpif77 ./build.sh 2>&1 | tail -5 || true"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./build/nekrs --setup examples/turbPipe/turbPipe.par"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "step"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "CC=mpicc CXX=mpicxx FC=mpif77 ./build.sh 2>&1 | tail -5 || true"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./build/nekrs --setup examples/turbPipe/turbPipe.par"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
