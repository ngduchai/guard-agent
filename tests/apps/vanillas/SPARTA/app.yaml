name: SPARTA
category: particle_fixed
language: cpp
description: "Direct Simulation Monte Carlo (DSMC) rarefied gas dynamics"
mpi_ranks: 4
build:
  system: make
  cmd: "cd src && make mpi && cp spa_mpi ../examples/free/"
run:
  cmd: "cd examples/free && mpirun -np {mpi_ranks} --oversubscribe ./spa_mpi -in in.validation"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "   20000"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: make
  cmd: "cd src && make mpi && cp spa_mpi ../examples/free/"
ckpt_run:
  cmd: "cd examples/free && mpirun -np {mpi_ranks} --oversubscribe ./spa_mpi -in in.validation"
  restart_cmd: "bash run_with_restart.sh {mpi_ranks}"
  timeout: 120
  kill_after: 5.0
