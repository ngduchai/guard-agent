name: ROSS
category: task_variable
language: c
description: "ROSS Parallel Discrete Event Simulation (PDES) - PHOLD benchmark"
mpi_ranks: 2
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DROSS_BUILD_MODELS=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) phold"
run:
  cmd: "mpirun -np 2 --oversubscribe ./_build/models/phold/phold --synch=3 --end=10000 --nlp=2000 --extramem=100000"
  timeout: 120
  kill_after: 5.0
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Lookahead\\.\\."
    - "Remote\\.\\.\\."
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DUSE_RIO=ON -DROSS_BUILD_MODELS=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) pholdio && cd .. && mpirun -np 2 --oversubscribe ./_build/models/pholdio/pholdio --synch=3 --end=5000 --nlp=2000 --extramem=100000 --io-store=1"
ckpt_run:
  cmd: "mpirun -np 2 --oversubscribe ./_build/models/pholdio/pholdio --synch=3 --end=10000 --nlp=2000 --extramem=100000 --io-store=1"
  restart_cmd: "bash run_with_restart.sh"
  timeout: 120
  kill_after: 5.0
