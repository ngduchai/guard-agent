name: ROSS
category: pipeline_variable
language: c
description: "Rensselaer's Optimistic Simulation System (parallel discrete-event)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DROSS_BUILD_MODELS=ON && make -j$(nproc)"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./build/models/phold/phold --synch=3 --end=500000 --extramem=100000"
  timeout: 120
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.1
  keep_patterns:
    - "Total GVT"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DROSS_BUILD_MODELS=ON -DUSE_RIO=ON && make -j$(nproc)"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./build/models/phold/phold --synch=3 --end=500000 --extramem=100000"
  timeout: 120
  kill_after: 5.0
