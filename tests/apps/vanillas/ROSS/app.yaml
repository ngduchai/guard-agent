name: ROSS
category: asynchronous
language: c
description: "ROSS Parallel Discrete Event Simulation (PDES) - PHOLD benchmark"
mpi_ranks: 2
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DROSS_BUILD_MODELS=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) phold"
run:
  # --end=30000 --nlp=4000 ≈ 130 s baseline (the prior --end=100000
  # --nlp=6000 overshot to 621 s, making Phase 4 unaffordable: 13 min per
  # validate.py call × LLM iterations would dominate the overnight budget).
  cmd: "mpirun -np 2 --oversubscribe ./_build/models/phold/phold --synch=3 --end=30000 --nlp=4000 --extramem=100000"
  timeout: 360
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "Lookahead\\.\\."
    - "Remote\\.\\.\\."
