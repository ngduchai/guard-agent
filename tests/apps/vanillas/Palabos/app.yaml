name: Palabos
category: pipeline_fixed
language: cpp
description: "Parallel Lattice Boltzmann CFD solver"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DENABLE_MPI=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && mpicxx -O3 -std=c++17 -I../src -I../externalLibraries -I/usr/include/hdf5/openmpi ../examples/showCases/cavity2d/cavity2d.cpp -L. -lpalabos -L/usr/lib/aarch64-linux-gnu/hdf5/openmpi -lhdf5 -o cavity2d"
run:
  cmd: "mpirun -np {mpi_ranks} ./_build/cavity2d"
  timeout: 120
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0
  ignore_patterns:
    - "Time spent"
    - "time"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DENABLE_MPI=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && mpicxx -O3 -std=c++17 -I../src -I../externalLibraries -I/usr/include/hdf5/openmpi ../examples/showCases/cavity2d/cavity2d.cpp -L. -lpalabos -L/usr/lib/aarch64-linux-gnu/hdf5/openmpi -lhdf5 -o cavity2d"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} ./_build/cavity2d"
  timeout: 120
