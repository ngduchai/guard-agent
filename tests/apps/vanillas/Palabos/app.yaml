name: Palabos
category: pipeline_fixed
language: cpp
description: "Parallel Lattice Boltzmann CFD solver (3D cavity checkpoint example)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DENABLE_MPI=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && cd .. && mpicxx -O3 -std=c++20 -DPLB_MPI_PARALLEL -I./src -I./externalLibraries -I./externalLibraries/Eigen3 examples/codesByTopic/io/checkPointing.cpp -L_build -lpalabos -o checkPointing"
run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./checkPointing 0 2000"
  timeout: 300
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "av energy"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DENABLE_MPI=ON -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && cd .. && mpicxx -O3 -std=c++20 -DPLB_MPI_PARALLEL -I./src -I./externalLibraries -I./externalLibraries/Eigen3 examples/codesByTopic/io/checkPointing.cpp -L_build -lpalabos -o checkPointing"
ckpt_run:
  cmd: "mpirun -np {mpi_ranks} --oversubscribe ./checkPointing 0 2000"
  timeout: 300
  kill_after: 5.0
