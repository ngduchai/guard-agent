name: WarpX
category: iterative_variable
language: cpp
description: "Advanced electromagnetic Particle-In-Cell code (AMReX-based)"
mpi_ranks: 4
build:
  system: cmake
  cmd: "cmake -S . -B build -DWarpX_DIMS=3 && cmake --build build -j4"
run:
  cmd: "mpirun -np {mpi_ranks} ./build/bin/warpx.3d inputs"
  timeout: 300
comparison:
  method: numeric
  output_file: null
  tolerance: 1.0e-4
checkpoint:
  library: native
  config_file: null
