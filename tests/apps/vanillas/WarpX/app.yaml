name: WarpX
category: iterative_adaptive
language: cpp
description: "Advanced electromagnetic Particle-In-Cell code (AMReX-based)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DWarpX_MPI=ON -DWarpX_COMPUTE=NOACC -DWarpX_DIMS=2 -DWarpX_EB=OFF -DWarpX_QED=OFF -DWarpX_OPENPMD=OFF -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "./_build/bin/warpx.2d.MPI.NOACC.DP.PDP test_input/inputs_validation"
  timeout: 120
comparison:
  method: text
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "completed successfully"
