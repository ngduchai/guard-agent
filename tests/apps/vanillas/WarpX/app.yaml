name: WarpX
category: pipeline_variable
language: cpp
description: "Advanced electromagnetic Particle-In-Cell code (AMReX-based)"
mpi_ranks: 1
build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DWarpX_MPI=ON -DWarpX_COMPUTE=NOACC -DWarpX_DIMS=3 -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
run:
  cmd: "EXE=$(ls _build/bin/warpx* | head -1) && $EXE test_input/inputs_validation"
  timeout: 300
  kill_after: 5.0
comparison:
  method: numeric
  output_file: null
  tolerance: 0.01
  keep_patterns:
    - "STEP 10000"
checkpoint:
  library: native
  config_file: null
ckpt_build:
  system: cmake
  cmd: "mkdir -p _build && cd _build && cmake .. -DWarpX_MPI=ON -DWarpX_COMPUTE=NOACC -DWarpX_DIMS=3 -DCMAKE_BUILD_TYPE=Release && make -j$(nproc)"
ckpt_run:
  cmd: "EXE=$(ls _build/bin/warpx* | head -1) && $EXE test_input/inputs_validation"
  restart_cmd: "bash run_with_restart.sh 1"
  timeout: 300
  kill_after: 5.0
