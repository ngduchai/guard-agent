name: HPCG
category: iterative_fixed
language: cpp
description: "High Performance Conjugate Gradient — Krylov solver (PCG with multigrid preconditioner) dominated by SpMV + MPI_Allreduce"
mpi_ranks: 4
build:
  system: make
  cmd: "make arch=Linux_MPI"
run:
  cmd: "cd bin && mpirun -np {mpi_ranks} --oversubscribe ./xhpcg_run --nx=32 --ny=32 --nz=32 --rt=120"
  timeout: 360
comparison:
  method: text
  output_file: null
  tolerance: 0.001
  keep_patterns:
    - "HPCG_VALIDATION="
